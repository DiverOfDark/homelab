          spec:
            configuration:
              destinationPath: "s3://diverofdark-homelab-backup/cnpg-backups/{{request.object.metadata.namespace}}/{{request.object.metadata.name}}/"
              endpointURL: https://s3.eu-central-2.wasabisys.com
              s3Credentials:
                accessKeyId:
                  name: cnpg-backup-wasabi-creds
                  key: ACCESS_KEY_ID
                secretAccessKey:
