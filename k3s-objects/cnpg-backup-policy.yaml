              kind: ClusterSecretStore
            refreshInterval: "1h"
            target:
              name: cnpg-backup-wasabi-creds
              creationPolicy: Owner
              deletionPolicy: Retain
            data:
              - secretKey: ACCESS_KEY_ID
                remoteRef:
                  key: wasabi
                  property: access_key
              - secretKey: ACCESS_SECRET_KEY
                remoteRef:
                  key: wasabi
                  property: secret_key
    - name: wasabi-store
      match:
        any:
          - resources:
              kinds:
                - postgresql.cnpg.io/v1/Cluster
      generate:
        apiVersion: barmancloud.cnpg.io/v1
        kind: ObjectStore
        name: wasabi-store
        namespace: "{{request.object.metadata.namespace}}"
        # synchronize is intentionally false: ExternalSecret has its own
        # active controller (ESO) that continuously writes back to the object.
        # With synchronize: true, Kyverno's downstream-watch reacted to every
        # ESO write, producing an UpdateRequest storm and resourceVersion
        # conflicts. Lifecycle/cleanup is instead handled by the ownerReference
