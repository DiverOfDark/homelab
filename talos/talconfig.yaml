# yaml-language-server: $schema=https://budimanjojo.github.io/talhelper/latest/schema.json

# renovate: image=ghcr.io/siderolabs/talosctl
talosVersion: v1.13.3
# renovate: image=registry.k8s.io/kube-apiserver
kubernetesVersion: v1.36.1

clusterName: homelab
endpoint: https://192.168.179.2:6443
allowSchedulingOnControlPlanes: true
domain: cluster.local
stableHostname: true

clusterPodNets:
  - 10.244.0.0/16
clusterSvcNets:
  - 10.96.0.0/12

cniConfig:
  name: none

additionalApiServerCertSans:
  - "192.168.179.2"

nodes:
  - hostname: asgard
    controlPlane: true
    ipAddress: 192.168.178.11
    # Pin to the system disk by stable wwid, NOT /dev/nvmeXn1 (names swap across
    # reboots). The old /dev/nvme1n1 actually pointed at the SN770 = Ceph OSD.1
    # bluestore disk; with install.wipe:true a reinstall there = OSD data loss.
    # This wwid is the WD_BLACK SN7100 (Talos system); the SN770 Ceph disk is
    # wwid eui.e8238fa6bf530001001b448b47f65e14.
    installDiskSelector:
      wwid: "eui.e8238fa6bf530001001b448b4340ccda"
    nameservers:
      - 192.168.178.2
    networkInterfaces:
      - interface: enp3s0
        addresses:
          - 192.168.178.11/23
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.178.1
            metric: 1024

  - hostname: jotunheimr
    controlPlane: true
    ipAddress: 192.168.178.13
    # System disk by wwid (WD Blue SA510 SATA); Ceph OSD is the separate NVMe.
    installDiskSelector:
      wwid: "naa.5001b448c1c85795"
    nameservers:
      - 192.168.178.2
    networkInterfaces:
      - interface: enp3s0
        addresses:
          - 192.168.178.13/23
        vip:
          ip: 192.168.179.2
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.178.1
            metric: 1024

  - hostname: niflheimr
    controlPlane: true
    ipAddress: 192.168.178.12
    # System disk by wwid (WD Blue SA510 SATA). Was /dev/sdb but it boots from
    # sda; Ceph OSD is the separate NVMe.
    installDiskSelector:
      wwid: "naa.5001b448c8cb5347"
    nameservers:
      - 192.168.178.2
    networkInterfaces:
      - interface: enp2s0
        addresses:
          - 192.168.178.12/23
        vip:
          ip: 192.168.179.2
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.178.1
            metric: 1024

  - hostname: muspelheimr
    controlPlane: false
    ipAddress: 192.168.178.14
    # System disk by wwid (WD Blue SA510 SATA); Ceph OSD is the separate NVMe.
    installDiskSelector:
      wwid: "naa.5001b448c8ca8b75"
    nameservers:
      - 192.168.178.2
    networkInterfaces:
      - interface: enp3s0
        addresses:
          - 192.168.178.14/23
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.178.1
            metric: 1024

# Image Factory schematic. NOTE: talhelper (v3.x) only reads `schematic` under a
# NODE or under the global controlPlane:/worker: templates — a TOP-LEVEL
# `schematic:` is silently ignored (which is why this block was inert and the
# nodes ran the empty schematic with none of these extensions/args applied).
# Defined once as a YAML anchor here and referenced from controlPlane:/worker:.
schematic: &schematic
  customization:
    extraKernelArgs:
      # Disable SELinux: Talos ships it permissive-only (enforce=0), so it blocks
      # nothing but floods the kernel log with avc-denied audit events from pods
      # writing to unlabeled Ceph volumes. NOTE: `selinux=0` does NOT work — Talos
      # already puts `selinux=1` in the base cmdline, and appending `selinux=0`
      # leaves both (last-wins doesn't apply, stays permissive). Use the kernel-arg
      # REMOVAL syntax `-selinux` to strip the default `selinux=1` entirely, which
      # disables SELinux (verified on the muspelheimr canary). talos#13477.
      - -selinux
      - talos.platform=metal
      # Ship kmsg to the REMOTE vector VIP (k3s-apps/victorialogs.yaml,
      # MetalLB 192.168.179.13:5051), not loopback: a kernel panic packet must
      # egress this node's NIC to a vector on a *healthy* node, or it dies with
      # the box on reboot. UDP is fire-and-forget so the panic line gets out
      # before the CPU halts → retained in VictoriaLogs across the reboot.
      - talos.logging.kernel=udp://192.168.179.13:5051
      - cpufreq.default_governor=conservative
      # Disable NVMe APST and PCIe ASPM: consumer NVMe controllers can wedge in a
      # deep power state and fail controller reset (-ENODEV), crashing the OSD.
      - nvme_core.default_ps_max_latency_us=0
      - pcie_aspm=off
    systemExtensions:
      # Curated for all-Intel hardware (i5-12400 / N100): amd-ucode + amdgpu
      # dropped as dead weight. kata-containers is intended (kata RuntimeClass +
      # kata-pulse are deployed) but was non-functional until this is applied.
      officialExtensions:
        - siderolabs/intel-ucode
        - siderolabs/binfmt-misc
        - siderolabs/i915
        - siderolabs/util-linux-tools
        - siderolabs/ctr
        - siderolabs/gvisor
        - siderolabs/kata-containers
        - siderolabs/stargz-snapshotter
        - siderolabs/nvme-cli
        - siderolabs/thunderbolt

# Patches applied to all nodes
patches:
  - |-
    machine:
      kubelet:
        defaultRuntimeSeccompProfileEnabled: true
        disableManifestsDirectory: true
        extraArgs:
          rotate-server-certificates: true
          max-pods: 200
      install:
        wipe: true
      files:
        - content: |
            [plugins."io.containerd.cri.v1.runtime"]
              device_ownership_from_security_context = true
          path: /etc/cri/conf.d/20-customization.part
          op: create
      features:
        rbac: true
        #apidCheckExtKeyUsage: false
        diskQuotaSupport: true
        kubePrism:
          enabled: true
          port: 7445
        hostDNS:
          enabled: false
          forwardKubeDNSToHost: false
      logging:
        destinations:
          - endpoint: udp://127.0.0.1:5050
            format: json_lines
  - |-
    cluster:
      coreDNS:
        disabled: true
      discovery:
        enabled: true
        registries:
          kubernetes:
            disabled: true
          service: {}
  - |-
    apiVersion: v1alpha1
    kind: KmsgLogConfig
    name: remote-log
    # Remote vector VIP, not loopback — see extraKernelArgs talos.logging.kernel
    # above. Both paths target the same MetalLB-exposed vector so kernel panics
    # are retained in VictoriaLogs across the reboot.
    url: udp://192.168.179.13:5051/
  # Registry pull-through cache via Harbor (k3s-apps/harbor.yaml). One proxy
  # project per upstream (terraform/harbor.tf: harbor_project.<name>), each
  # exposed at harbor.kirillorlov.pro/v2/<project>/<image>. `overridePath:
  # true` is required because Harbor uses path-prefixed proxy projects
  # rather than the ns-query routing ociregistry uses. The direct upstream
  # endpoint is kept as fallback so a Harbor outage doesn't brick pulls.
  - |-
    machine:
      registries:
        mirrors:
          docker.io:
            endpoints:
              - https://harbor.kirillorlov.pro/v2/docker-hub
              - https://registry-1.docker.io/v2
            overridePath: true
          ghcr.io:
            endpoints:
              - https://harbor.kirillorlov.pro/v2/ghcr
              - https://ghcr.io/v2
            overridePath: true
          quay.io:
            endpoints:
              - https://harbor.kirillorlov.pro/v2/quay
              - https://quay.io/v2
            overridePath: true
          registry.k8s.io:
            endpoints:
              - https://harbor.kirillorlov.pro/v2/registry-k8s
              - https://registry.k8s.io/v2
            overridePath: true
          public.ecr.aws:
            endpoints:
              - https://harbor.kirillorlov.pro/v2/ecr-public
              - https://public.ecr.aws/v2
            overridePath: true
          # Kyverno ships its admission webhook + background-controller images
          # from its own registry — 5 pods in this cluster currently pull from
          # reg.kyverno.io (kyverno, background-controller, cleanup-controller,
          # kyvernopre, reports-controller).
          reg.kyverno.io:
            endpoints:
              - https://harbor.kirillorlov.pro/v2/kyverno
              - https://reg.kyverno.io/v2
            overridePath: true

# talhelper reads `schematic` per-node or from these global templates, NOT from
# the top-level key — so reference the anchor here to apply it to all nodes.
worker:
  schematic: *schematic

controlPlane:
  schematic: *schematic
  patches:
    - |-
      machine:
        features:
          kubernetesTalosAPIAccess:
            enabled: true
            allowedRoles:
              - os:reader
              - os:admin
            allowedKubernetesNamespaces:
              - system-upgrade
    - |-
      cluster:
        apiServer:
          disablePodSecurityPolicy: true
          admissionControl:
            - name: PodSecurity
              configuration:
                apiVersion: pod-security.admission.config.k8s.io/v1alpha1
                defaults:
                  audit: restricted
                  audit-version: latest
                  enforce: baseline
                  enforce-version: latest
                  warn: restricted
                  warn-version: latest
                exemptions:
                  namespaces: []
                  runtimeClasses: []
                  usernames:
                    - system:serviceaccount:velero:velero-server
                kind: PodSecurityConfiguration
          # Audit policy is on the etcd-disk write path: every API call lands in
          # /var/log/audit/kube on the system SATA SSD. The default
          # "Metadata for everything" generates ~100MB every 20 min — most of
          # it leader-election lease renewals, kubelet self-status, controller
          # endpoint-slice churn, and healthz probes. Filter the noise to
          # leave only meaningful events.
          auditPolicy:
            apiVersion: audit.k8s.io/v1
            kind: Policy
            omitStages:
              - RequestReceived
            rules:
              # Non-resource URLs (healthz/livez/readyz/metrics/openapi) — pure noise.
              - level: None
                nonResourceURLs:
                  - /healthz*
                  - /livez*
                  - /readyz*
                  - /version*
                  - /metrics*
                  - /openapi*
                  - /swagger*
              # Leader-election leases — kube-controller-manager / kube-scheduler
              # renew every 2s, every controller does the same. ~1 audit line per
              # renewal across dozens of controllers.
              - level: None
                resources:
                  - group: coordination.k8s.io
                    resources: ["leases"]
                verbs: ["get", "update", "patch"]
              # Controllers list/watch endpointslices and endpoints constantly.
              - level: None
                resources:
                  - group: discovery.k8s.io
                    resources: ["endpointslices"]
                  - group: ""
                    resources: ["endpoints"]
                verbs: ["get", "list", "watch"]
              # Events are high-volume and already captured by the event store.
              - level: None
                resources:
                  - group: ""
                    resources: ["events"]
              # Kubelet self-status / node lease — every node every 10s.
              - level: None
                userGroups: ["system:nodes"]
                verbs: ["get", "list", "watch", "patch", "update"]
                resources:
                  - group: ""
                    resources: ["nodes", "nodes/status"]
              # Core control-plane components doing read traffic — already
              # implicit in their function, audit trail not useful.
              - level: None
                users:
                  - system:kube-scheduler
                  - system:kube-controller-manager
                  - system:apiserver
                verbs: ["get", "list", "watch"]
              # Everything else: keep Metadata so the audit trail still exists
              # for real authn/authz events, writes, and exec/portforward.
              - level: Metadata
        proxy:
          disabled: true
        etcd:
          extraArgs:
            listen-metrics-urls: http://0.0.0.0:2381
            # Loosened from defaults (heartbeat 100ms / election 1000ms) because
            # asgard's WAL fsync p99 sits around 120ms, causing leader churn.
            # election-timeout must be >= 5× heartbeat-interval.
            heartbeat-interval: "250"
            election-timeout: "2500"
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
            # Default is 12500 — way above any realistic count for this
            # cluster — so terminated ReplicaSet-owned pods (e.g. Ceph
            # daemons that crash during an MDS hiccup, or any RS pod
            # left in Failed/Completed state after a rolling update)
            # never get garbage-collected by Kubernetes' built-in podGC.
            # kube-cleanup-operator handles Job/CronJob-spawned pods,
            # not RS-spawned ones, so without lowering this the cluster
            # accumulates Failed pods indefinitely.
            terminated-pod-gc-threshold: "200"
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0
