version: "3"

vars:
  SECRET_FILE: ./talsecret.sops.yaml
  DECRYPTED_SECRET_FILE: ./talsecret.yaml
  OUTPUT_DIR: ./clusterconfig

tasks:
  genconfig:
    desc: Generate Talos machine configs (decrypts secrets with SOPS)
    cmds:
      - sops -d {{ .SECRET_FILE }} > {{ .DECRYPTED_SECRET_FILE }}
      - talhelper genconfig --secret-file {{ .DECRYPTED_SECRET_FILE }} --out-dir {{ .OUTPUT_DIR }}
      - defer: rm -f {{ .DECRYPTED_SECRET_FILE }}
    preconditions:
      - sh: command -v sops
        msg: "sops not found - enter the nix dev shell first"
      - sh: command -v talhelper
        msg: "talhelper not found - enter the nix dev shell first"

  validate:
    desc: Validate generated Talos machine configs
    deps: [genconfig]
    cmds:
      - |
        for f in {{ .OUTPUT_DIR }}/*.yaml; do
          echo "Validating $f..."
          talosctl validate --config "$f" --mode metal
        done
        talhelper gencommand apply --out-dir {{ .OUTPUT_DIR }} --node "$node" --extra-flags "--dry-run" | bash

  apply:
    desc: Apply configs to all nodes (rolling, one at a time)
    deps: [genconfig]
    cmds:
      - |
        set -euo pipefail
        for node in $(yq -r '.nodes[].hostname' talconfig.yaml); do
          echo "Applying config to $node..."
          talhelper gencommand apply --out-dir {{ .OUTPUT_DIR }} --node "$node" --extra-flags "-m staged" | bash
        done
    prompt: "Apply Talos configs to ALL nodes (rolling)?"

  kubeconfig:
    desc: Generate kubeconfig from Talos
    deps: [genconfig]
    cmds:
      - talosctl --talosconfig {{ .OUTPUT_DIR }}/talosconfig kubeconfig

  reboot:
    desc: Rolling reboot of all nodes (drain → reboot via Talos → uncordon, one at a time)
    deps: [genconfig]
    cmds:
      - |
        set -euo pipefail
        TALOSCONFIG="{{ .OUTPUT_DIR }}/talosconfig"
        for node in $(yq -r '.nodes[].hostname' talconfig.yaml); do
          ip=$(yq -r ".nodes[] | select(.hostname == \"$node\") | .ipAddress" talconfig.yaml)

          # Drain first so workloads relocate gracefully instead of being
          # killed mid-flight by talosctl reboot. PDBs are honored, so
          # 2-replica deployments stay available throughout. DaemonSets
          # are ignored (they're recreated automatically post-reboot),
          # and emptyDir is allowed to be deleted (it's by definition
          # ephemeral). etcd/kube-apiserver/kubelet are Talos system
          # services, not k8s-tracked pods — drain doesn't touch them.
          echo "==> Draining $node..."
          kubectl drain "$node" \
            --ignore-daemonsets \
            --delete-emptydir-data \
            --timeout=10m

          echo "==> Rebooting $node ($ip)..."
          talosctl --talosconfig "$TALOSCONFIG" -n "$ip" reboot --wait

          echo "==> Waiting for $node to be Ready in kubernetes..."
          kubectl wait --for=condition=Ready node/"$node" --timeout=10m

          # kubectl drain leaves the node cordoned; uncordon so it can
          # take pods again now that it's back.
          echo "==> Uncordoning $node..."
          kubectl uncordon "$node"
        done
    prompt: "Rolling reboot ALL nodes one at a time (with drain)?"

  dashboard:
    desc: "Open Talos dashboard (usage: task dashboard -- <hostname>)"
    deps: [genconfig]
    vars:
      NODE_IP:
        sh: yq '.nodes[] | select(.hostname == "{{ .CLI_ARGS }}") | .ipAddress' talconfig.yaml
    cmds:
      - talosctl --talosconfig {{ .OUTPUT_DIR }}/talosconfig dashboard -n {{ .NODE_IP }}
    requires:
      vars: [CLI_ARGS]