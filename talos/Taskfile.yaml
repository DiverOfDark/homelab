version: "3"

vars:
  SECRET_FILE: ./talsecret.sops.yaml
  DECRYPTED_SECRET_FILE: ./talsecret.yaml
  OUTPUT_DIR: ./clusterconfig

tasks:
  genconfig:
    desc: Generate Talos machine configs (decrypts secrets with SOPS)
    cmds:
      - sops -d {{ .SECRET_FILE }} > {{ .DECRYPTED_SECRET_FILE }}
      - talhelper genconfig --secret-file {{ .DECRYPTED_SECRET_FILE }} --out-dir {{ .OUTPUT_DIR }}
      - defer: rm -f {{ .DECRYPTED_SECRET_FILE }}
    preconditions:
      - sh: command -v sops
        msg: "sops not found - enter the nix dev shell first"
      - sh: command -v talhelper
        msg: "talhelper not found - enter the nix dev shell first"

  validate:
    desc: Validate generated Talos machine configs
    deps: [genconfig]
    cmds:
      - |
        for f in {{ .OUTPUT_DIR }}/*.yaml; do
          echo "Validating $f..."
          talosctl validate --config "$f" --mode metal
        done

  apply:
    desc: Apply configs to all nodes (rolling, one at a time)
    deps: [genconfig]
    cmds:
      - |
        set -euo pipefail
        for node in $(yq '.nodes[].hostname' talconfig.yaml); do
          echo "Applying config to $node..."
          talhelper gencommand apply --out-dir {{ .OUTPUT_DIR }} --node "$node" | bash
          echo "Waiting for $node to be healthy..."
          ip=$(yq ".nodes[] | select(.hostname == \"$node\") | .ipAddress" talconfig.yaml)
          talosctl --talosconfig {{ .OUTPUT_DIR }}/talosconfig health --wait-timeout 5m -n "$ip" || true
        done
    prompt: "Apply Talos configs to ALL nodes (rolling)?"

  "apply:node":
    desc: "Apply config to a specific node (usage: task apply:node -- <hostname>)"
    deps: [genconfig]
    cmds:
      - talhelper gencommand apply --out-dir {{ .OUTPUT_DIR }} --node {{ .CLI_ARGS }} | bash
    requires:
      vars: [CLI_ARGS]
    prompt: "Apply Talos config to node '{{ .CLI_ARGS }}'?"

  upgrade:
    desc: Upgrade Talos on all nodes
    deps: [genconfig]
    cmds:
      - talhelper gencommand upgrade --out-dir {{ .OUTPUT_DIR }} | bash
    prompt: "Upgrade Talos on ALL nodes?"

  "upgrade:node":
    desc: "Upgrade Talos on a specific node (usage: task upgrade:node -- <hostname>)"
    deps: [genconfig]
    cmds:
      - talhelper gencommand upgrade --out-dir {{ .OUTPUT_DIR }} --node {{ .CLI_ARGS }} | bash
    requires:
      vars: [CLI_ARGS]
    prompt: "Upgrade Talos on node '{{ .CLI_ARGS }}'?"

  "upgrade:k8s":
    desc: Upgrade Kubernetes on the cluster
    deps: [genconfig]
    cmds:
      - talhelper gencommand upgrade-k8s --out-dir {{ .OUTPUT_DIR }} | bash
    prompt: "Upgrade Kubernetes on the cluster?"

  kubeconfig:
    desc: Generate kubeconfig from Talos
    deps: [genconfig]
    cmds:
      - talosctl --talosconfig {{ .OUTPUT_DIR }}/talosconfig kubeconfig

  dashboard:
    desc: "Open Talos dashboard (usage: task dashboard -- <hostname>)"
    deps: [genconfig]
    vars:
      NODE_IP:
        sh: yq '.nodes[] | select(.hostname == "{{ .CLI_ARGS }}") | .ipAddress' talconfig.yaml
    cmds:
      - talosctl --talosconfig {{ .OUTPUT_DIR }}/talosconfig dashboard -n {{ .NODE_IP }}
    requires:
      vars: [CLI_ARGS]

  health:
    desc: Check cluster health
    deps: [genconfig]
    vars:
      NODE_IP:
        sh: yq '.nodes[] | select(.hostname == "{{ .CLI_ARGS }}") | .ipAddress' talconfig.yaml
    cmds:
      - talosctl --talosconfig {{ .OUTPUT_DIR }}/talosconfig health -n {{ .NODE_IP }}
