apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: acme-issuer
    gethomepage.dev/enabled: "true"
    gethomepage.dev/href: "https://trmnl.kirillorlov.pro/dashboard.html"
    gethomepage.dev/group: Apps
    gethomepage.dev/name: TRMNL Cyberpunk
    gethomepage.dev/icon: https://avatars.githubusercontent.com/u/164423030?s=48&v=4
    gethomepage.dev/pod-selector: "app.kubernetes.io/pod=trmnl-cyberpunk"
    gethomepage.dev/description: "Spectra 6-color e-ink dashboard"
  name: trmnl-cyberpunk
  namespace: trmnl-cyberpunk
spec:
  rules:
    - host: trmnl.kirillorlov.pro
      http:
        paths:
          - backend:
              service:
                name: trmnl-cyberpunk
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - trmnl.kirillorlov.pro
      secretName: trmnl-cyberpunk-tls
