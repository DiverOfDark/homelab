apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-secret
  namespace: paperless
spec:
  secretStoreRef:
    name: openbao-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  target:
    name: paperless-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        PAPERLESS_SECRET_KEY: "{{ .secret }}"
        PAPERLESS_ADMIN_PASSWORD: "{{ .password }}"
        PAPERLESS_API_KEY: "{{ .apiToken }}"
  data:
    - secretKey: secret
      remoteRef:
        key: paperless
        property: secret_key
    - secretKey: password
      remoteRef:
        key: pihole
        property: password
    - secretKey: apiToken
      remoteRef:
        key: paperless
        property: api_key
---
