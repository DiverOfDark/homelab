apiVersion: apps/v1
kind: Deployment
metadata:
  name: terminus
  namespace: terminus
spec:
  progressDeadlineSeconds: 600
  strategy:
    type: Recreate
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/pod: terminus
  template:
    metadata:
      labels:
        app.kubernetes.io/pod: terminus
    spec:
      securityContext:
        fsGroup: 1000
      volumes:
        - name: terminus
          persistentVolumeClaim:
            claimName: terminus
      containers:
        - image: 'docker.io/valkey/valkey:9-alpine'
          name: valkey
          ports:
            - containerPort: 6379
              protocol: TCP
              name: valkey
          volumeMounts:
            - mountPath: /data
              name: terminus
              subPath: valkey
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
        - image: 'ghcr.io/usetrmnl/terminus:0.56.0'
          name: terminus
          ports:
            - containerPort: 2345
              protocol: TCP
              name: http
          env:
            - name: HANAMI_PORT
              value: "2345"
            - name: APP_SETUP
              value: "true"
            - name: API_URI
              value: https://terminus.kirillorlov.pro
            - name: KEYVALUE_URL
              value: redis://localhost:6379
            - name: RACK_ATTACK_ALLOWED_SUBNETS
              value: "10.244.0.0/16"
            - name: TZ
              value: Europe/Berlin
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: terminus-secret
                  key: APP_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: terminus-pg-app
                  key: uri
          volumeMounts:
            - mountPath: /app/public/uploads
              name: terminus
              subPath: uploads
          livenessProbe:
            httpGet:
              path: /
              port: 2345
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 2345
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 15
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
        - image: 'ghcr.io/usetrmnl/terminus:0.56.0'
          name: sidekiq
          command: ["bundle", "exec", "sidekiq", "-r", "./config/sidekiq.rb"]
          env:
            - name: API_URI
              value: https://terminus.kirillorlov.pro
            - name: KEYVALUE_URL
              value: redis://localhost:6379
            - name: RACK_ATTACK_ALLOWED_SUBNETS
              value: "10.244.0.0/16"
            - name: TZ
              value: Europe/Berlin
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: terminus-secret
                  key: APP_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: terminus-pg-app
                  key: uri
          volumeMounts:
            - mountPath: /app/public/uploads
              name: terminus
              subPath: uploads
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
