apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: github-runner-instance-peelbox
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    targetRevision: 0.14.0
    chart: gha-runner-scale-set
    helm:
      valuesObject:

        githubConfigUrl: "https://github.com/diverofdark/peelbox"

        githubConfigSecret: github-secret

        containerMode:
          type: "kubernetes"
          kubernetesModeWorkVolumeClaim:
            accessModes: ["ReadWriteMany"]
            storageClassName: "ceph-filesystem"
            resources:
              requests:
                storage: 5Gi

        maxRunners: 5
        minRunners: 1
        controllerServiceAccount:
          name: "github-runner-controller-gha-rs-controller"
          namespace: "github-runner-instance-peelbox"

        template:
          spec:
            restartPolicy: Never
            initContainers:
              - name: init-k8s-volume-permissions
                image: ghcr.io/actions/actions-runner:latest
                command: [ "sudo", "chown", "-R", "runner", "/home/runner/_work" ]
                volumeMounts:
                  - name: work
                    mountPath: /home/runner/_work
  destination:
    server: https://kubernetes.default.svc
    namespace: github-runner
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged