apiVersion: apps/v1
kind: Deployment
metadata:
  name: shared-dind
  namespace: github-runner
  labels:
    app: shared-dind
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: shared-dind
  template:
    metadata:
      labels:
        app: shared-dind
    spec:
      terminationGracePeriodSeconds: 60
      nodeSelector:
        kubernetes.io/hostname: asgard
      containers:
        - name: dind
          image: docker:29-dind
          args:
            - dockerd
            - --host=tcp://0.0.0.0:2375
            - --host=unix:///var/run/docker.sock
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          ports:
            - name: docker
              containerPort: 2375
          securityContext:
            privileged: true
          volumeMounts:
            - name: data
              mountPath: /var/lib/docker
            - name: run
              mountPath: /var/run
          readinessProbe:
            tcpSocket:
              port: 2375
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 2375
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              # Reserve the tmpfs footprint at schedule time so asgard is never memory-overcommitted
              # (no swap on Talos — overcommit would mean a node OOM next to etcd/apiserver).
              memory: 20Gi
            limits:
              # MUST exceed the tmpfs sizeLimit (20Gi) + dockerd RSS. The in-RAM image store (shmem) is
              # charged to this container's memory cgroup; if limit <= tmpfs cap, dind is OOM-killed when full.
              memory: 24Gi
      volumes:
        - name: data
          emptyDir:
            # tmpfs: docker's image/layer store lives in RAM, so build I/O never touches asgard's
            # etcd disk (sda). k8s sets the tmpfs mount to size=20Gi, so a runaway build gets a clean
            # ENOSPC instead of eating node memory. NOTE: ephemeral — the image cache is lost on every
            # dind restart (cold pulls over the network each time); keep the prune CronJob tight (below).
            # Sized from a measured run: one e2e (gradle + k3s-in-dind) peaked at ~15Gi of tmpfs, so 16Gi
            # was at the edge. 20Gi gives headroom; node still had ~22Gi MemAvailable at that peak.
            medium: Memory
            sizeLimit: 20Gi
        - name: run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: shared-dind
  namespace: github-runner
spec:
  clusterIP: None
  selector:
    app: shared-dind
  ports:
    - name: docker
      port: 2375
      targetPort: 2375
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: shared-dind-prune
  namespace: github-runner
spec:
  # Every 3h: the docker store now lives in a 16Gi tmpfs (in shared-dind), so it must be kept lean
  # to avoid ENOSPC mid-build. Tune frequency/retention by how fast the tmpfs fills under real CI load.
  schedule: "0 */3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: prune
              image: docker:29-cli
              env:
                - name: DOCKER_HOST
                  value: tcp://shared-dind:2375
              command:
                - sh
                - -c
                - |
                  set -eu
                  docker container prune -f --filter "until=24h"
                  docker image prune -af --filter "until=12h"
                  docker volume prune -f
                  docker builder prune -af --filter "until=12h"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  memory: 256Mi
