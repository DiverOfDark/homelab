apiVersion: v1
kind: Service
metadata:
  name: hermes-api
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.179.20
  selector:
    kubevirt.io/domain: claw
  ports:
    - name: ssh
      port: 22
      # sshd in the guest listens on 22320 (cloud-init hardening snippet);
      # tailnet :22 is Tailscale SSH, which never hits this Service.
      targetPort: 22320
      protocol: TCP
    - name: hermes-api
      port: 8642
      targetPort: 8642
      protocol: TCP
    - name: hermes-webui
      port: 9119
      targetPort: 9119
      protocol: TCP