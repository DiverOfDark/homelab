apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: acme-issuer
  name: hermes
spec:
  rules:
    - host: hermes.kirillorlov.pro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes-api
                port:
                  name: hermes-api
  tls:
    - hosts:
        - hermes.kirillorlov.pro
      secretName: hermes-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: acme-issuer
    gethomepage.dev/enabled: "true"
    gethomepage.dev/href: "https://hermes-ui.kirillorlov.pro"
    gethomepage.dev/group: Apps
    gethomepage.dev/name: Hermes
    gethomepage.dev/pod-selector: "kubevirt.io/domain=claw"
  name: hermes-ui
spec:
  rules:
    - host: hermes-ui.kirillorlov.pro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes-api
                port:
                  name: hermes-webui
  tls:
    - hosts:
        - hermes-ui.kirillorlov.pro
      secretName: hermes-ui-tls
