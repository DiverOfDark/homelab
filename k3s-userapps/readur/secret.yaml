apiVersion: v1
kind: Secret
metadata:
  name: readur-secret
  namespace: readur
type: Opaque
stringData:
  JWT_SECRET: "your-secret-key-change-this-in-production-readur"
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "8000"
  UPLOAD_PATH: "/app/uploads"
  WATCH_FOLDER: "/app/watch"
  OCR_LANGUAGE: "eng"
  CONCURRENT_OCR_JOBS: "4"
  OCR_TIMEOUT_SECONDS: "300"
  MAX_FILE_SIZE_MB: "50"
  MEMORY_LIMIT_MB: "512"
  CPU_PRIORITY: "normal"
  ALLOWED_FILE_TYPES: "pdf,txt,doc,docx,png,jpg,jpeg"
  WATCH_INTERVAL_SECONDS: "30"
  FILE_STABILITY_CHECK_MS: "1000"
  MAX_FILE_AGE_HOURS: "24"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: readur-zitadel
  namespace: readur
spec:
  secretStoreRef:
    name: openbao-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  target:
    name: readur-zitadel
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: client_id
      remoteRef:
        key: zitadel/readur-credentials
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: zitadel/readur-credentials
        property: client_secret
