apiVersion: apps/v1
kind: Deployment
metadata:
  name: readur
  namespace: readur
spec:
  progressDeadlineSeconds: 600
  strategy:
    type: Recreate
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/pod: readur
  template:
    metadata:
      labels:
        app.kubernetes.io/pod: readur
    spec:
      volumes:
        - name: readur-uploads
          persistentVolumeClaim:
            claimName: readur-uploads
        - name: readur-watch
          persistentVolumeClaim:
            claimName: readur-watch
      containers:
        - image: 'ghcr.io/readur/readur:2.8.0'
          imagePullPolicy: IfNotPresent
          name: readur
          ports:
            - containerPort: 8000
              protocol: TCP
              name: "http"
          envFrom:
            - secretRef:
                name: readur-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: readur-pg-app
                  key: uri
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: readur-pg-app
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: readur-pg-app
                  key: password
            - name: OIDC_ENABLED
              value: "true"
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: readur-zitadel
                  key: client_id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: readur-zitadel
                  key: client_secret
            - name: OIDC_ISSUER_URL
              value: "https://auth.kirillorlov.pro"
            - name: OIDC_REDIRECT_URI
              value: "https://readur.kirillorlov.pro/auth/callback"
            - name: OIDC_AUTO_REGISTER
              value: "true"
          volumeMounts:
            - mountPath: /app/uploads
              name: readur-uploads
            - mountPath: /app/watch
              name: readur-watch
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi

