# Scrapes node_exporter + headscale metrics on bifrost over the tailnet (same
# static-target pattern as the pihole ScrapeConfig in k3s-userapps/externaldns/).
# Neither port is exposed on bifrost's public IP — nftables only accepts them
# via tailscale0 — so these targets only work once the home Talos nodes are on
# the tailnet (Phase 3), since prometheus pods egress via the node's tailscaled.
# bifrost.ts.kirillorlov.pro resolves in-cluster via the MagicDNS forward zone
# in k3s-apps/coredns.yaml (CoreDNS → node tailscaled) — no IPs to maintain.
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: bifrost-nodeexporter
  namespace: headplane
spec:
  metricsPath: /metrics
  staticConfigs:
    - labels:
        job: bifrost
      targets:
        - bifrost.ts.kirillorlov.pro:9100
---
# yggdrasil (offsite backup mini-PC) node_exporter — installed by the ansible
# base role, reachable tailnet-only (nftables), scraped over the tailnet like
# bifrost above.
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: yggdrasil-nodeexporter
  namespace: headplane
spec:
  metricsPath: /metrics
  staticConfigs:
    - labels:
        job: yggdrasil
      targets:
        - yggdrasil.ts.kirillorlov.pro:9100
---
# claw/hermes KubeVirt VM node_exporter. Scrape the guest over its tailnet
# address, just like the other external hosts. A PodMonitor cannot reliably
# reach a guest service through the virt-launcher pod's masquerade network.
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: hermes-nodeexporter
  namespace: headplane
spec:
  metricsPath: /metrics
  staticConfigs:
    - labels:
        job: hermes
      targets:
        - claw.ts.kirillorlov.pro:9100
---
# headscale's own metrics (metrics_listen_addr 0.0.0.0:9090 in the ansible
# config template) — same tailnet-only exposure as node_exporter above.
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: headscale
  namespace: headplane
spec:
  metricsPath: /metrics
  staticConfigs:
    - labels:
        job: headscale
      targets:
        - bifrost.ts.kirillorlov.pro:9090
