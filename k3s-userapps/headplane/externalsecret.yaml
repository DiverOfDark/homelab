# Seed OpenBao first:
#   bao kv put secret/headplane \
#     cookie_secret=$(openssl rand -hex 16) \
#     api_key=$(ssh -p 22320 root@167.233.110.114 headscale apikeys create --expiration 9000d)
# cookie_secret must be exactly 32 characters (hex 16 == 32 chars).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headplane-secrets
  namespace: headplane
spec:
  secretStoreRef:
    name: openbao-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  target:
    name: headplane-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        cookie_secret: '{{ .cookie_secret }}'
        api_key: '{{ .api_key }}'
        oidc_client_id: '{{ .oidc_client_id }}'
        oidc_client_secret: '{{ .oidc_client_secret }}'
  data:
    - secretKey: cookie_secret
      remoteRef:
        key: headplane
        property: cookie_secret
    - secretKey: api_key
      remoteRef:
        key: headplane
        property: api_key
    # Zitadel OIDC app managed by terraform/zitadel.tf; creds written to
    # OpenBao by the zitadel_credentials loop.
    - secretKey: oidc_client_id
      remoteRef:
        key: zitadel/headplane-credentials
        property: client_id
    - secretKey: oidc_client_secret
      remoteRef:
        key: zitadel/headplane-credentials
        property: client_secret