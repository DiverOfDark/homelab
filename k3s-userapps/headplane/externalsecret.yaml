# Seed OpenBao first:
#   bao kv put secret/headplane \
#     cookie_secret=$(openssl rand -hex 16) \
#     api_key=$(ssh -p 22320 root@headscale.kirillorlov.pro headscale apikeys create --expiration 9000d)
# cookie_secret must be exactly 32 characters (hex 16 == 32 chars).
#
# The whole headplane config is rendered here (not a ConfigMap): headplane 0.6
# validates the config file strictly before env overrides apply, and several
# required values are secrets (cookie_secret, api key, OIDC client creds).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headplane-secrets
  namespace: headplane
spec:
  secretStoreRef:
    name: openbao-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  target:
    name: headplane-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        config.yaml: |
          server:
            host: 0.0.0.0
            port: 3000
            base_url: https://headplane.kirillorlov.pro
            cookie_secure: true
            cookie_secret: "{{ .cookie_secret }}"
            data_path: /data
          # API-only mode: manages nodes/users/routes/preauth keys via the
          # headscale API on bifrost. No config-file/docker integration
          # (headscale lives outside the cluster), so DNS/ACL file editing
          # stays ansible/CLI-on-bifrost.
          headscale:
            url: https://headscale.kirillorlov.pro
            api_key: "{{ .api_key }}"
            config_strict: false
          # Zitadel SSO (same IdP as headscale itself); API-key login stays
          # enabled as fallback so a Zitadel outage can't lock the UI.
          oidc:
            issuer: https://auth.kirillorlov.pro
            client_id: "{{ .oidc_client_id }}"
            client_secret: "{{ .oidc_client_secret }}"
            redirect_uri: https://headplane.kirillorlov.pro/admin/oidc/callback
            token_endpoint_auth_method: client_secret_basic
            disable_api_key_login: false
            headscale_api_key: "{{ .api_key }}"
  data:
    - secretKey: cookie_secret
      remoteRef:
        key: headplane
        property: cookie_secret
    - secretKey: api_key
      remoteRef:
        key: headplane
        property: api_key
    # Zitadel OIDC app managed by terraform/zitadel.tf; creds written to
    # OpenBao by the zitadel_credentials loop.
    - secretKey: oidc_client_id
      remoteRef:
        key: zitadel/headplane-credentials
        property: client_id
    - secretKey: oidc_client_secret
      remoteRef:
        key: zitadel/headplane-credentials
        property: client_secret