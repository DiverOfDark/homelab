# Internal-only (no kirillorlov.pro/expose label): the tailnet admin UI is
# reachable from LAN + tailnet, never via the public edge.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headplane
  namespace: headplane
  annotations:
    cert-manager.io/cluster-issuer: acme-issuer

    gethomepage.dev/enabled: "true"
    gethomepage.dev/href: "https://headplane.kirillorlov.pro/admin"
    gethomepage.dev/group: Infra
    gethomepage.dev/name: Headplane
    gethomepage.dev/icon: tailscale.png
    gethomepage.dev/description: headscale admin UI
    gethomepage.dev/pod-selector: "app=headplane"
spec:
  rules:
    - host: headplane.kirillorlov.pro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: headplane
                port:
                  name: http
  tls:
    - hosts:
        - headplane.kirillorlov.pro
      secretName: headplane-tls