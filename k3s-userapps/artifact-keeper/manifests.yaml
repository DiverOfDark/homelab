apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-backup-yggdrasil-creds
  namespace: artifact-keeper
spec:
  secretStoreRef:
    name: openbao-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  target:
    name: cnpg-backup-yggdrasil-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: yggdrasil-s3
        property: access_key
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: yggdrasil-s3
        property: secret_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-backup-wasabi-creds
  namespace: artifact-keeper
spec:
  secretStoreRef:
    name: openbao-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  target:
    name: cnpg-backup-wasabi-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: wasabi
        property: access_key
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: wasabi
        property: secret_key
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: yggdrasil-store
  namespace: artifact-keeper
spec:
  configuration:
    destinationPath: s3://cnpg-backups/artifact-keeper/artifact-keeper-db/
    endpointURL: https://yggdrasil.kirillorlov.pro
    s3Credentials:
      accessKeyId:
        name: cnpg-backup-yggdrasil-creds
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-backup-yggdrasil-creds
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
      maxParallel: 2
    data:
      compression: gzip
  retentionPolicy: "30d"
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: wasabi-store
  namespace: artifact-keeper
spec:
  configuration:
    destinationPath: s3://diverofdark-homelab-backup/cnpg-backups/artifact-keeper/artifact-keeper-db/
    endpointURL: https://s3.eu-central-2.wasabisys.com
    s3Credentials:
      accessKeyId:
        name: cnpg-backup-wasabi-creds
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-backup-wasabi-creds
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
      maxParallel: 2
    data:
      compression: gzip
  retentionPolicy: "30d"
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: artifact-keeper-db
  namespace: artifact-keeper
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 10Gi
    storageClass: ceph-block
  bootstrap:
    initdb:
      database: artifact_registry
      owner: registry
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: yggdrasil-store
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: artifact-keeper-db-backup-yggdrasil
  namespace: artifact-keeper
spec:
  schedule: "0 0 0 * * *"
  backupOwnerReference: self
  cluster:
    name: artifact-keeper-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: yggdrasil-store
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: artifact-keeper-db-backup-wasabi
  namespace: artifact-keeper
spec:
  schedule: "0 0 12 * * *"
  backupOwnerReference: self
  cluster:
    name: artifact-keeper-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: wasabi-store
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: artifact-storage
  namespace: artifact-keeper
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ceph-filesystem
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meilisearch-data
  namespace: artifact-keeper
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-block
  resources:
    requests:
      storage: 5Gi
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: artifact-keeper-secrets
  namespace: artifact-keeper
spec:
  secretStoreRef:
    name: openbao-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  target:
    name: artifact-keeper-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        JWT_SECRET: "{{`{{ .password }}`}}"
  data:
    - secretKey: password
      remoteRef:
        key: artifact-keeper
        property: jwt_secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meilisearch
  namespace: artifact-keeper
spec:
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: meilisearch
  template:
    metadata:
      labels:
        app: meilisearch
    spec:
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.40
          ports:
            - containerPort: 7700
          env:
            - name: MEILI_EXPERIMENTAL_DUMPLESS_UPGRADE
              value: "true"
            - name: MEILI_MASTER_KEY
              value: "artifact-keeper-dev-key" # Should be in secret
            - name: MEILI_ENV
              value: "production"
          volumeMounts:
            - name: data
              mountPath: /meili_data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: meilisearch-data
---
apiVersion: v1
kind: Service
metadata:
  name: meilisearch
  namespace: artifact-keeper
spec:
  ports:
    - port: 7700
  selector:
    app: meilisearch
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: artifact-keeper
  namespace: artifact-keeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: artifact-keeper
  template:
    metadata:
      labels:
        app: artifact-keeper
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: artifact-keeper
              topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: ghcr.io/artifact-keeper/artifact-keeper-backend:1.1.6
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: artifact-keeper-db-app
                  key: uri
            - name: STORAGE_PATH
              value: "/data/storage"
            - name: MEILISEARCH_URL
              value: "http://meilisearch:7700"
            - name: MEILISEARCH_API_KEY
              value: "artifact-keeper-dev-key"
            - name: RUST_LOG
              value: "info"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: artifact-keeper-secrets
                  key: JWT_SECRET
          volumeMounts:
            - name: storage
              mountPath: /data/storage
        - name: frontend
          image: ghcr.io/artifact-keeper/artifact-keeper-web:1.1.6
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              value: "http://localhost:8080"
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: artifact-storage
---
apiVersion: v1
kind: Service
metadata:
  name: artifact-keeper
  namespace: artifact-keeper
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: artifact-keeper
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: artifact-keeper
  namespace: artifact-keeper
  annotations:
    cert-manager.io/cluster-issuer: acme-issuer
    gethomepage.dev/enabled: "true"
    gethomepage.dev/href: "https://artifacts.kirillorlov.pro"
    gethomepage.dev/group: Infra
    gethomepage.dev/name: ArtifactKeeper
    gethomepage.dev/icon: "https://artifactkeeper.com/favicon.png"
    gethomepage.dev/pod-selector: "app=artifact-keeper"
spec:
  rules:
    - host: artifacts.kirillorlov.pro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: artifact-keeper
                port:
                  name: http
  tls:
    - hosts:
        - artifacts.kirillorlov.pro
      secretName: artifact-keeper-tls
