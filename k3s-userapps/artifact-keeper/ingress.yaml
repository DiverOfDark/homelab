apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: artifact-keeper
  namespace: artifact-keeper
  annotations:
    cert-manager.io/cluster-issuer: acme-issuer
    gethomepage.dev/enabled: "true"
    gethomepage.dev/href: "https://artifacts.kirillorlov.pro"
    gethomepage.dev/group: Infra
    gethomepage.dev/name: ArtifactKeeper
    gethomepage.dev/icon: "https://artifactkeeper.com/favicon.png"
    gethomepage.dev/pod-selector: "app=artifact-keeper-backend"
spec:
  rules:
    - host: artifacts.kirillorlov.pro
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: artifact-keeper-backend
                port:
                  name: backend
          - path: /health
            pathType: Exact
            backend:
              service:
                name: artifact-keeper-backend
                port:
                  name: backend
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: artifact-keeper-backend
                port:
                  name: backend
          - path: /v2
            pathType: Prefix
            backend:
              service:
                name: artifact-keeper-backend
                port:
                  name: backend
