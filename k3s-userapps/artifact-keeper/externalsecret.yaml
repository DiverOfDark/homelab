apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-backup-yggdrasil-creds
  namespace: artifact-keeper
spec:
  secretStoreRef:
    name: openbao-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  target:
    name: cnpg-backup-yggdrasil-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: yggdrasil-s3
        property: access_key
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: yggdrasil-s3
        property: secret_key
---
