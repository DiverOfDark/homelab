apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rss-telegram-bot-secret
  namespace: rss-telegram-bot
spec:
  secretStoreRef:
    name: bitwarden-login
    kind: ClusterSecretStore

  refreshInterval: "10s"

  target:
    name: rss-telegram-bot-secret
    creationPolicy: 'Owner'
    deletionPolicy: "Retain"
    template:
      type: Opaque
      data:
        TOKEN: "{{ .token }}"
        MANAGER: "{{ .manager }}"
        TELEGRAPH_TOKEN: "{{ .telegraph }}"
        API_ID: "{{ .apiId }}"
        API_HASH: "{{ .apiHash }}"
  data:
    - secretKey: apiHash
      remoteRef:
        key: e5e0e13c-af69-44ad-9874-3df4c3d48f29
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        property: password
    - secretKey: apiId
      remoteRef:
        key: e5e0e13c-af69-44ad-9874-3df4c3d48f29
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        property: username
    - secretKey: manager
      remoteRef:
        key: 7fceab96-1517-4474-81c7-e9565822fb2f
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        property: username
    - secretKey: telegraph
      remoteRef:
        key: 78f8a69c-831d-4949-8a42-b72443978231
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        property: password
    - secretKey: token
      remoteRef:
        key: 7fceab96-1517-4474-81c7-e9565822fb2f
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        property: password
