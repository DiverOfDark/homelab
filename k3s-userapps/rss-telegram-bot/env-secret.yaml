apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rss-telegram-bot-secret
  namespace: rss-telegram-bot
spec:
  secretStoreRef:
    name: openbao-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  target:
    name: rss-telegram-bot-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        TOKEN: "{{ .token }}"
        MANAGER: "{{ .manager }}"
        TELEGRAPH_TOKEN: "{{ .telegraph }}"
        API_ID: "{{ .apiId }}"
        API_HASH: "{{ .apiHash }}"
  data:
    - secretKey: apiHash
      remoteRef:
        key: rss-telegram-bot
        property: api_hash
    - secretKey: apiId
      remoteRef:
        key: rss-telegram-bot
        property: api_id
    - secretKey: manager
      remoteRef:
        key: rss-telegram-bot
        property: manager
    - secretKey: telegraph
      remoteRef:
        key: rss-telegram-bot
        property: telegraph_token
    - secretKey: token
      remoteRef:
        key: rss-telegram-bot
        property: bot_token
