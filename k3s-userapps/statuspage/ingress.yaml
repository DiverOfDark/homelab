apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage
  namespace: statuspage
  labels:
    app.kubernetes.io/name: homepage
    # Canary for the Hetzner edge migration: Kyverno generates a
    # homepage-external twin on the traefik-external class (see
    # k3s-objects/external-ingress-policy.yaml). DNS flips separately via
    # terraform local.migrated_hostnames.
    kirillorlov.pro/expose: external
  annotations:
    cert-manager.io/cluster-issuer: acme-issuer
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"

    gethomepage.dev/enabled: "true"
    gethomepage.dev/href: "https://status.kirillorlov.pro"
    gethomepage.dev/group: Infra
    gethomepage.dev/name: Status Page
    gethomepage.dev/icon: homepage.png
    gethomepage.dev/description: this page
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=homepage"
spec:
  rules:
    - host: "status.kirillorlov.pro"
      http:
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: homepage
                port:
                  number: 3000
  tls:
  - hosts:
    - status.kirillorlov.pro
    secretName: statuspage-tls