apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-scripts
  namespace: openbao-backup
data:
  .sops.yaml: |
    creation_rules:
      - age: >-
          ssh-rsa ,
          age13jdehut862zq4zp5cnglmxs4twhudhll7zdmt0ga2uqee9uaacqsthywd4
  export-secrets.sh: |
    #!/bin/sh
    set -e

    apk add --no-cache jq > /dev/null 2>&1

    echo "Authenticating to OpenBao..."
    SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    export BAO_TOKEN=$(bao write -field=token auth/kubernetes/login \
      role=openbao-backup-role jwt="$SA_TOKEN")
    echo "Authenticated to OpenBao."

    echo "Exporting secrets from OpenBao..."

    list_secrets() {
      local prefix="$1"
      local keys
      keys=$(bao kv list -format=json "secret/${prefix}" 2>/dev/null) || return 0

      echo "$keys" | jq -r '.[]' | while read -r key; do
        if echo "$key" | grep -q '/$'; then
          list_secrets "${prefix}${key}"
        else
          echo "${prefix}${key}"
        fi
      done
    }

    ALL_PATHS=$(list_secrets "")
    echo "${ALL_PATHS}" > /shared/paths.txt
    echo "{}" > /shared/secrets.json

    if [ -z "$ALL_PATHS" ]; then
      echo "No secrets found."
      exit 0
    fi

    echo "$ALL_PATHS" | while read -r path; do
      echo "  Reading: ${path}"
      SECRET_DATA=$(bao kv get -format=json "secret/${path}" | jq '.data.data')
      jq --argjson data "$SECRET_DATA" --arg path "$path" \
        '. + {($path): $data}' /shared/secrets.json > /shared/secrets.json.tmp
      mv /shared/secrets.json.tmp /shared/secrets.json
    done

    SECRET_COUNT=$(jq 'length' /shared/secrets.json)
    echo "Exported ${SECRET_COUNT} secrets."

    sha256sum /shared/secrets.json | awk '{print $1}' > /shared/secrets.sha256

  git-push.sh: |
    #!/bin/sh
    set -e

    echo "Cloning git repo..."
    REPO_DIR="/shared/homelab"
    git clone --depth 1 "https://x-access-token:${GITHUB_PAT}@github.com/DiverOfDark/homelab.git" "$REPO_DIR"

    mkdir -p "${REPO_DIR}/backups"
    NEW_HASH=$(cat /shared/secrets.sha256)
    OLD_HASH=$(cat "${REPO_DIR}/backups/openbao-secrets.sha256" 2>/dev/null || echo "")

    if [ "$NEW_HASH" = "$OLD_HASH" ]; then
      echo "No changes to commit (plaintext hash unchanged)."
    else
      cp /shared/openbao-secrets.sops.json "${REPO_DIR}/backups/openbao-secrets.sops.json"
      cp /shared/secrets.sha256 "${REPO_DIR}/backups/openbao-secrets.sha256"

      cd "$REPO_DIR"
      git config user.email "openbao-backup@homelab.local"
      git config user.name "OpenBao Backup"
      git add backups/openbao-secrets.sops.json backups/openbao-secrets.sha256
      git commit -m "backup: update OpenBao secrets $(date -u +%Y-%m-%dT%H:%M:%SZ)"
      git push
      echo "Pushed updated backup to git."
    fi
