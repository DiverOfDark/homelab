apiVersion: batch/v1
kind: CronJob
metadata:
  name: openbao-backup
  namespace: openbao-backup
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 900
      template:
        spec:
          serviceAccountName: openbao-backup-sa
          restartPolicy: OnFailure
          initContainers:
            - name: export-secrets
              image: ghcr.io/openbao/openbao:2.5.2
              command: ["/bin/sh", "/scripts/export-secrets.sh"]
              env:
                - name: BAO_ADDR
                  value: "http://openbao-active.openbao.svc.cluster.local:8200"
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: shared
                  mountPath: /shared
            - name: encrypt-sops
              image: alpine:3.23
              command: ["/bin/sh", "-c"]
              args:
                - apk add --no-cache curl > /dev/null 2>&1 &&
                  curl -sL "https://github.com/getsops/sops/releases/download/v3.12.1/sops-v3.12.1.linux.amd64" -o /usr/local/bin/sops &&
                  chmod +x /usr/local/bin/sops &&
                  sops --config /scripts/.sops.yaml --encrypt --output /shared/openbao-secrets.sops.json /shared/secrets.json
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: shared
                  mountPath: /shared
          containers:
            - name: git-push
              image: alpine/git:latest
              command: ["/bin/sh", "/scripts/git-push.sh"]
              env:
                - name: GITHUB_PAT
                  valueFrom:
                    secretKeyRef:
                      name: backup-github-creds
                      key: pat
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: shared
                  mountPath: /shared
          volumes:
            - name: scripts
              configMap:
                name: backup-scripts
                defaultMode: 0755
            - name: shared
              emptyDir: {}
