apiVersion: batch/v1
kind: CronJob
metadata:
  name: openbao-backup
  namespace: openbao-backup
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 900
      template:
        spec:
          serviceAccountName: openbao-backup-sa
          restartPolicy: OnFailure
          initContainers:
            - name: export-secrets
              image: ghcr.io/openbao/openbao:2.5.1
              command: ["/bin/sh", "/scripts/export-secrets.sh"]
              env:
                - name: BAO_ADDR
                  value: "http://openbao-active.openbao.svc.cluster.local:8200"
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: shared
                  mountPath: /shared
            - name: encrypt-sops
              image: alpine:3.21
              command: ["/bin/sh", "-c"]
              args:
                - apk add --no-cache sops > /dev/null 2>&1 &&
                  sops --config /scripts/.sops.yaml --encrypt --output /shared/openbao-secrets.sops.json /shared/secrets.json
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: shared
                  mountPath: /shared
            - name: git-push
              image: alpine/git:latest
              command: ["/bin/sh", "/scripts/git-push.sh"]
              env:
                - name: GITHUB_PAT
                  valueFrom:
                    secretKeyRef:
                      name: backup-github-creds
                      key: pat
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: shared
                  mountPath: /shared
          containers:
            - name: vaultwarden-sync
              image: node:22-alpine
              command: ["/bin/sh", "/scripts/vaultwarden-sync.sh"]
              env:
                - name: VW_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: backup-vaultwarden-creds
                      key: email
                - name: VW_MASTER_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: backup-vaultwarden-creds
                      key: master_password
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: shared
                  mountPath: /shared
                - name: bw-config
                  mountPath: /root/.config
          volumes:
            - name: scripts
              configMap:
                name: backup-scripts
                defaultMode: 0755
            - name: shared
              emptyDir: {}
            - name: bw-config
              persistentVolumeClaim:
                claimName: bw-config
