apiVersion: v1
kind: Namespace
metadata:
  name: openbao-backup
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openbao-backup-sa
  namespace: openbao-backup
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-script
  namespace: openbao-backup
data:
  backup.sh: |
    #!/bin/sh
    set -e

    # ── Phase 1: Setup ──────────────────────────────────────────────
    echo "Installing dependencies..."
    apk add --no-cache git jq curl > /dev/null 2>&1

    # Install sops
    SOPS_VERSION="3.9.4"
    curl -sL "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64" \
      -o /usr/local/bin/sops
    chmod +x /usr/local/bin/sops

    # Install Bitwarden CLI
    BW_VERSION="2025.1.3"
    curl -sL "https://github.com/bitwarden/clients/releases/download/cli-v${BW_VERSION}/bw-linux-${BW_VERSION}.zip" \
      -o /tmp/bw.zip
    unzip -o /tmp/bw.zip -d /usr/local/bin/ > /dev/null 2>&1
    chmod +x /usr/local/bin/bw
    rm /tmp/bw.zip

    # Authenticate to OpenBao via Kubernetes SA token
    echo "Authenticating to OpenBao..."
    SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    export BAO_TOKEN=$(bao write -field=token auth/kubernetes/login \
      role=openbao-backup-role jwt="$SA_TOKEN")
    echo "Authenticated to OpenBao."

    # ── Phase 2: Export secrets ─────────────────────────────────────
    echo "Exporting secrets from OpenBao..."
    WORKDIR=$(mktemp -d)
    SECRETS_FILE="${WORKDIR}/secrets.json"

    list_secrets() {
      local prefix="$1"
      local keys
      keys=$(bao kv list -format=json "secret/${prefix}" 2>/dev/null) || return 0

      echo "$keys" | jq -r '.[]' | while read -r key; do
        if echo "$key" | grep -q '/$'; then
          # It's a directory, recurse
          list_secrets "${prefix}${key}"
        else
          echo "${prefix}${key}"
        fi
      done
    }

    # Collect all secret paths
    ALL_PATHS=$(list_secrets "")
    if [ -z "$ALL_PATHS" ]; then
      echo "No secrets found, exiting."
      exit 0
    fi

    # Build combined JSON
    echo "{}" > "$SECRETS_FILE"
    echo "$ALL_PATHS" | while read -r path; do
      echo "  Reading: ${path}"
      SECRET_DATA=$(bao kv get -format=json "secret/${path}" | jq '.data.data')
      ESCAPED_PATH=$(echo "$path" | jq -Rs '.')
      jq --argjson data "$SECRET_DATA" --arg path "$path" \
        '. + {($path): $data}' "$SECRETS_FILE" > "${SECRETS_FILE}.tmp"
      mv "${SECRETS_FILE}.tmp" "$SECRETS_FILE"
    done

    SECRET_COUNT=$(jq 'length' "$SECRETS_FILE")
    echo "Exported ${SECRET_COUNT} secrets."

    # ── Phase 3: SOPS encrypt + git push ────────────────────────────
    echo "Encrypting with SOPS..."
    AGE_RECIPIENT="age13jdehut862zq4zp5cnglmxs4twhudhll7zdmt0ga2uqee9uaacqsthywd4"
    ENCRYPTED_FILE="${WORKDIR}/openbao-secrets.sops.json"
    sops --encrypt --age "$AGE_RECIPIENT" "$SECRETS_FILE" > "$ENCRYPTED_FILE"

    echo "Cloning git repo..."
    REPO_DIR="${WORKDIR}/homelab"
    git clone --depth 1 "https://x-access-token:${GITHUB_PAT}@github.com/DiverOfDark/homelab.git" "$REPO_DIR"

    mkdir -p "${REPO_DIR}/backups"
    cp "$ENCRYPTED_FILE" "${REPO_DIR}/backups/openbao-secrets.sops.json"

    cd "$REPO_DIR"
    git config user.email "openbao-backup@homelab.local"
    git config user.name "OpenBao Backup"

    if git diff --quiet -- backups/openbao-secrets.sops.json; then
      echo "No changes to commit."
    else
      git add backups/openbao-secrets.sops.json
      git commit -m "backup: update OpenBao secrets $(date -u +%Y-%m-%dT%H:%M:%SZ)"
      git push
      echo "Pushed updated backup to git."
    fi

    # ── Phase 4: Vaultwarden sync ───────────────────────────────────
    echo "Syncing to Vaultwarden..."
    export NODE_OPTIONS="--no-warnings"

    # Login to Vaultwarden
    export BW_SESSION=$(bw login "$VW_EMAIL" "$VW_MASTER_PASSWORD" \
      --raw 2>/dev/null)
    bw sync

    # Find or create "OpenBao Backup" folder
    FOLDER_ID=$(bw list folders | jq -r '.[] | select(.name=="OpenBao Backup") | .id')
    if [ -z "$FOLDER_ID" ]; then
      FOLDER_ID=$(bw create folder "$(echo '{"name":"OpenBao Backup"}' | bw encode)" \
        | jq -r '.id')
      echo "Created folder 'OpenBao Backup' (${FOLDER_ID})"
    fi

    # Get list of existing items in the folder
    EXISTING_ITEMS=$(bw list items --folderid "$FOLDER_ID")

    # Sync each secret
    echo "$ALL_PATHS" | while read -r path; do
      SECRET_DATA=$(jq --arg p "$path" '.[$p]' "$SECRETS_FILE")
      ITEM_ID=$(echo "$EXISTING_ITEMS" | jq -r --arg name "$path" \
        '.[] | select(.name==$name) | .id')

      # Build custom fields array from key-value pairs
      FIELDS=$(echo "$SECRET_DATA" | jq '[to_entries[] | {
        name: .key,
        value: (.value | tostring),
        type: 1
      }]')

      if [ -n "$ITEM_ID" ]; then
        # Update existing item
        ITEM_JSON=$(bw get item "$ITEM_ID")
        UPDATED=$(echo "$ITEM_JSON" | jq --argjson fields "$FIELDS" \
          '.fields = $fields')
        echo "$UPDATED" | bw encode | bw edit item "$ITEM_ID" > /dev/null
        echo "  Updated: ${path}"
      else
        # Create new secure note
        NEW_ITEM=$(jq -n --arg name "$path" --arg folderId "$FOLDER_ID" \
          --argjson fields "$FIELDS" '{
            type: 2,
            secureNote: { type: 0 },
            name: $name,
            folderId: $folderId,
            fields: $fields,
            notes: null
          }')
        echo "$NEW_ITEM" | bw encode | bw create item > /dev/null
        echo "  Created: ${path}"
      fi
    done

    # Cleanup stale entries
    echo "Cleaning up stale entries..."
    EXISTING_ITEMS=$(bw list items --folderid "$FOLDER_ID")
    echo "$EXISTING_ITEMS" | jq -r '.[].name' | while read -r item_name; do
      if ! echo "$ALL_PATHS" | grep -qxF "$item_name"; then
        STALE_ID=$(echo "$EXISTING_ITEMS" | jq -r --arg name "$item_name" \
          '.[] | select(.name==$name) | .id')
        bw delete item "$STALE_ID" > /dev/null
        echo "  Deleted stale: ${item_name}"
      fi
    done

    bw logout
    echo "Backup complete."
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: openbao-backup
  namespace: openbao-backup
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 900
      template:
        spec:
          serviceAccountName: openbao-backup-sa
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: ghcr.io/openbao/openbao:2.5.1
              command: ["/bin/sh", "/scripts/backup.sh"]
              env:
                - name: BAO_ADDR
                  value: "http://openbao-active.openbao.svc.cluster.local:8200"
                - name: GITHUB_PAT
                  valueFrom:
                    secretKeyRef:
                      name: backup-github-creds
                      key: pat
                - name: VW_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: backup-vaultwarden-creds
                      key: email
                - name: VW_MASTER_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: backup-vaultwarden-creds
                      key: master_password
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: scripts
              configMap:
                name: backup-script
                defaultMode: 0755
