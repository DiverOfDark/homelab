apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: actualbudget
  namespace: actualbudget
spec:
  secretStoreRef:
    name: bitwarden-login
    kind: ClusterSecretStore  # or ClusterSecretStore

  refreshInterval: "1h"

  target:
    name: actualbudget
    creationPolicy: 'Owner'
    deletionPolicy: "Retain"
    template:
      type: Opaque
      data:
        password: "{{ .password }}"
        apikey: "{{ .apikey }}"
  data:
    - secretKey: password
      remoteRef:
        key: 60e1043e-ceb8-4ed1-b241-e5b8c8f00efc
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        property: password
    - secretKey: apikey
      remoteRef:
        key: 0e313ad2-4820-4e9b-b86f-5d4816dbb1e0
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: actualbudget-zitadel
  namespace: actualbudget
spec:
  secretStoreRef:
    name: openbao-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  target:
    name: actualbudget-zitadel
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: client_id
      remoteRef:
        key: zitadel/actual_budget-credentials
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: zitadel/actual_budget-credentials
        property: client_secret