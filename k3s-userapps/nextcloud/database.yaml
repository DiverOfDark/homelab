apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nextcloud-pg
  namespace: nextcloud
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  storage:
    size: 10Gi
  monitoring:
    enablePodMonitor: true
  postgresql:
    parameters:
      max_slot_wal_keep_size: "2GB"
  bootstrap:
    initdb:
      database: nextcloud
      owner: nextcloud
