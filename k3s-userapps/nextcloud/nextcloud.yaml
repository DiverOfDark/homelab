apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  progressDeadlineSeconds: 600
  # Recreate (not the default RollingUpdate): Nextcloud keeps code + data on one
  # RWX volume and does not support two versions running against it at once. On
  # an image bump RollingUpdate would start the new pod while the old still runs,
  # so the migration never runs cleanly. Recreate terminates the old pod first,
  # letting the new image's entrypoint run `occ upgrade` cleanly on every bump.
  strategy:
    type: Recreate
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/pod: nextcloud
  template:
    metadata:
      labels:
        app.kubernetes.io/pod: nextcloud
    spec:
      volumes:
        - name: nextcloud
          persistentVolumeClaim:
            claimName: nextcloud
      containers:
        - image: 'nextcloud:33.0.5'
          imagePullPolicy: IfNotPresent
          name: nextcloud
          env:
            - name: OVERWRITEHOST
              value: cloud.kirillorlov.pro
            - name: OVERWRITEPROTOCOL
              value: https
            - name: TRUSTED_PROXIES
              value: 10.42.0.0/16
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: nextcloud-pg-app
                  key: host
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: nextcloud-pg-app
                  key: dbname
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: nextcloud-pg-app
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-pg-app
                  key: password
          volumeMounts:
            - mountPath: /var/www/html
              name: nextcloud
          lifecycle:
            postStart:
              exec:
                command:
                  - "sh"
                  - "-c"
                  - "apt-get update && apt-get install -y openrc ffmpeg && start-stop-daemon --start --background --pidfile /cron.pid --exec /cron.sh"
          # startupProbe gates liveness/readiness until startup (incl. upgrade)
          # finishes. The entrypoint runs `occ upgrade` BEFORE Apache binds :80,
          # so without this the livenessProbe would kill the pod mid-migration
          # and crashloop forever. 60 * 10s = up to 10 min for the migration.
          startupProbe:
            httpGet:
              path: /status.php
              port: 80
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /status.php
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /status.php
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "2"