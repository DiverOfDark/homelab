apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: zitadel-db
  namespace: zitadel
spec:
  instances: 3
  primaryUpdateStrategy: unsupervised
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5-8-bullseye
  enableSuperuserAccess: true

  postgresql:
    parameters:
      max_connections: "200"
      max_slot_wal_keep_size: "2GB"

  storage:
    size: 20Gi

  bootstrap:
    initdb:
      database: zitadel
      owner: zitadel

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: yggdrasil-store

  monitoring:
    enablePodMonitor: true
