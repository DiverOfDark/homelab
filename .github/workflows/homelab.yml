name: Homelab CI/CD

on:
  push:
    branches: [ "master" ]

  pull_request:
    branches: [ "master" ]

  workflow_dispatch:

jobs:
  talos-validate:
    name: Validate Talos Configs
    runs-on: github-runner-instance
    container: nixos/nix:latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-store-${{ hashFiles('flake.lock') }}
          restore-keys: nix-store-
      - name: Generate and validate configs
        env:
          BAO_ADDR: http://openbao-active.openbao.svc.cluster.local:8200
          BAO_TOKEN: ${{ secrets.OPENBAO_TOKEN }}
        run: |
          nix develop --extra-experimental-features "nix-command flakes" --command bash -c '
            cd talos
            task genconfig
            task validate
          '

  talos-apply:
    name: Apply Talos Configs
    concurrency:
      group: talos-apply
      cancel-in-progress: true
    needs:
      - talos-validate
    runs-on: github-runner-instance
    container: nixos/nix:latest
    if: github.ref == 'refs/heads/master'
    environment:
      name: Homelab
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-store-${{ hashFiles('flake.lock') }}
          restore-keys: nix-store-
      - name: Apply configs
        env:
          BAO_ADDR: http://openbao-active.openbao.svc.cluster.local:8200
          BAO_TOKEN: ${{ secrets.OPENBAO_TOKEN }}
        run: |
          nix develop --extra-experimental-features "nix-command flakes" --command bash -c '
            cd talos
            task genconfig
            talhelper gencommand apply --out-dir ./clusterconfig | bash
          '

  tofu-plan:
    name: Plan OpenTofu
    runs-on: github-runner-instance
    container: nixos/nix:latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-store-${{ hashFiles('flake.lock') }}
          restore-keys: nix-store-
      - name: OpenTofu plan
        env:
          TF_VAR_openbao_token: ${{ secrets.OPENBAO_TOKEN }}
          KUBERNETES_SERVICE_HOST: kubernetes.default.svc
          KUBERNETES_SERVICE_PORT: 443
          TF_CLI_ARGS_init: "-backend-config=config.kubernetes.tfbackend"
        run: |
          nix develop --extra-experimental-features "nix-command flakes" --command bash -c '
            cd terraform
            tofu init
            tofu plan -lock=false
          '

  tofu-apply:
    concurrency:
      group: tofu-apply
      cancel-in-progress: true
    needs:
      - tofu-plan
    name: Apply OpenTofu
    runs-on: github-runner-instance
    container: nixos/nix:latest
    if: github.ref == 'refs/heads/master'
    environment:
      name: Homelab
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-store-${{ hashFiles('flake.lock') }}
          restore-keys: nix-store-
      - name: OpenTofu apply
        env:
          TF_VAR_openbao_token: ${{ secrets.OPENBAO_TOKEN }}
          KUBERNETES_SERVICE_HOST: kubernetes.default.svc
          KUBERNETES_SERVICE_PORT: 443
          TF_CLI_ARGS_init: "-backend-config=config.kubernetes.tfbackend"
        run: |
          nix develop --extra-experimental-features "nix-command flakes" --command bash -c '
            cd terraform
            tofu init
            tofu apply -auto-approve
          '
