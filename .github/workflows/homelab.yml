name: Homelab CI/CD

on:
  push:
    branches: [ "master" ]

  pull_request:
    branches: [ "master" ]

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NIX_CACHE_S3: "s3://nix-cache?endpoint=rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local&scheme=http&region=us-east-1"

jobs:
  validate:
    name: Validate
    runs-on: github-runner-instance
    container: buildpack-deps:trixie
    steps:
      - uses: actions/checkout@v6
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: DeterminateSystems/determinate-nix-action@v3.17.1
      - name: Configure Nix S3 cache
        if: env.AWS_ACCESS_KEY_ID != ''
        run: |
          cat >> /etc/nix/nix.conf <<EOF
          extra-substituters = $NIX_CACHE_S3
          require-sigs = false
          EOF
      - name: Build dev shell and push to S3 cache
        run: |
          nix build .#devShells.x86_64-linux.default --no-link
          if [ -n "${AWS_ACCESS_KEY_ID:-}" ]; then
            nix copy --to "$NIX_CACHE_S3" .#devShells.x86_64-linux.default
          fi
      - name: Generate and validate configs
        env:
          BAO_TOKEN: ${{ secrets.OPENBAO_TOKEN }}
        run: |
          nix develop --command bash -euxo pipefail -c '
            pushd talos
            task genconfig
            task validate
            popd

            pushd terraform
            tofu init
            tofu plan -lock=false
          '

  apply:
    name: Apply
    concurrency:
      group: apply
      cancel-in-progress: true
    needs:
      - validate
    runs-on: github-runner-instance
    container: buildpack-deps:trixie
    if: github.ref == 'refs/heads/master'
    environment:
      name: Homelab
    steps:
      - uses: actions/checkout@v6
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: DeterminateSystems/determinate-nix-action@v3.17.1
      - name: Configure Nix S3 cache
        if: env.AWS_ACCESS_KEY_ID != ''
        run: |
          cat >> /etc/nix/nix.conf <<EOF
          extra-substituters = $NIX_CACHE_S3
          require-sigs = false
          EOF
      - name: Build dev shell and push to S3 cache
        run: |
          nix build .#devShells.x86_64-linux.default --no-link
          if [ -n "${AWS_ACCESS_KEY_ID:-}" ]; then
            nix copy --to "$NIX_CACHE_S3" .#devShells.x86_64-linux.default
          fi
      - name: Apply configs
        env:
          BAO_TOKEN: ${{ secrets.OPENBAO_TOKEN }}
        run: |
          nix develop --command bash -euxo pipefail -c '
            pushd talos
            task apply --yes
            popd

            pushd terraform
            tofu init
            tofu apply -auto-approve
            popd
          '
