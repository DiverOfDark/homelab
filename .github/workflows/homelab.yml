name: Homelab CI/CD

on:
  push:
    branches: [ "master" ]

  pull_request:
    branches: [ "master" ]

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NIX_CACHE_S3: "s3://nix-cache?endpoint=rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local&scheme=http&region=us-east-1"

jobs:
  validate:
    name: Validate
    runs-on: github-runner-instance
    container: buildpack-deps:trixie
    steps:
      - uses: actions/checkout@v6
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Fetch nix cache S3 credentials
        id: cache
        continue-on-error: true
        run: |
          set -eu
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
          RESP=$(curl -sf -k \
            -H "Authorization: Bearer $TOKEN" \
            "https://kubernetes.default.svc/api/v1/namespaces/$NS/secrets/nix-cache")
          decode() { echo "$RESP" | python3 -c "import sys,json,base64; print(base64.b64decode(json.load(sys.stdin)['data']['$1']).decode())"; }
          echo "::add-mask::$(decode AWS_ACCESS_KEY_ID)"
          echo "::add-mask::$(decode AWS_SECRET_ACCESS_KEY)"
          echo "AWS_ACCESS_KEY_ID=$(decode AWS_ACCESS_KEY_ID)" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$(decode AWS_SECRET_ACCESS_KEY)" >> "$GITHUB_ENV"
      - uses: DeterminateSystems/determinate-nix-action@v3.17.1
      - name: Configure Nix S3 cache
        if: steps.cache.outcome == 'success'
        run: |
          cat >> /etc/nix/nix.conf <<EOF
          extra-substituters = $NIX_CACHE_S3
          require-sigs = false
          EOF
      - name: Build dev shell and push to S3 cache
        run: |
          nix build .#devShells.x86_64-linux.default --no-link
          if [ "${{ steps.cache.outcome }}" = "success" ]; then
            nix copy --to "$NIX_CACHE_S3" .#devShells.x86_64-linux.default
          fi
      - name: Generate and validate configs
        env:
          BAO_TOKEN: ${{ secrets.OPENBAO_TOKEN }}
        run: |
          nix develop --command bash -euxo pipefail -c '
            pushd talos
            task genconfig
            task validate
            popd

            pushd terraform
            tofu init
            tofu plan -lock=false
          '

  apply:
    name: Apply
    concurrency:
      group: apply
      cancel-in-progress: true
    needs:
      - validate
    runs-on: github-runner-instance
    container: buildpack-deps:trixie
    if: github.ref == 'refs/heads/master'
    environment:
      name: Homelab
    steps:
      - uses: actions/checkout@v6
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Fetch nix cache S3 credentials
        id: cache
        continue-on-error: true
        run: |
          set -eu
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
          RESP=$(curl -sf -k \
            -H "Authorization: Bearer $TOKEN" \
            "https://kubernetes.default.svc/api/v1/namespaces/$NS/secrets/nix-cache")
          decode() { echo "$RESP" | python3 -c "import sys,json,base64; print(base64.b64decode(json.load(sys.stdin)['data']['$1']).decode())"; }
          echo "::add-mask::$(decode AWS_ACCESS_KEY_ID)"
          echo "::add-mask::$(decode AWS_SECRET_ACCESS_KEY)"
          echo "AWS_ACCESS_KEY_ID=$(decode AWS_ACCESS_KEY_ID)" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$(decode AWS_SECRET_ACCESS_KEY)" >> "$GITHUB_ENV"
      - uses: DeterminateSystems/determinate-nix-action@v3.17.1
      - name: Configure Nix S3 cache
        if: steps.cache.outcome == 'success'
        run: |
          cat >> /etc/nix/nix.conf <<EOF
          extra-substituters = $NIX_CACHE_S3
          require-sigs = false
          EOF
      - name: Build dev shell and push to S3 cache
        run: |
          nix build .#devShells.x86_64-linux.default --no-link
          if [ "${{ steps.cache.outcome }}" = "success" ]; then
            nix copy --to "$NIX_CACHE_S3" .#devShells.x86_64-linux.default
          fi
      - name: Apply configs
        env:
          BAO_TOKEN: ${{ secrets.OPENBAO_TOKEN }}
        run: |
          nix develop --command bash -euxo pipefail -c '
            pushd talos
            task apply --yes
            popd

            pushd terraform
            tofu init
            tofu apply -auto-approve
            popd
          '
