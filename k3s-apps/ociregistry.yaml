apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ociregistry
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: ociregistry
    server: https://kubernetes.default.svc
  project: default
  source:
    # Lightweight, pull-only / pull-through caching OCI distribution server
    # (github.com/aceeric/ociregistry). Replaces artifact-keeper as the
    # cluster's registry mirror. Chart is published as an OCI artifact, same
    # pattern as kata-pulse.yaml.
    chart: ociregistry
    # ArgoCD's oci:// handling uses the full repoURL path as the OCI repository
    # (it does NOT append `chart:`), so the chart name must be in the path —
    # same as kata-pulse.yaml. Artifact: quay.io/appzygy/helm-charts/ociregistry.
    repoURL: oci://quay.io/appzygy/helm-charts/ociregistry
    targetRevision: 1.13.0
    helm:
      releaseName: ociregistry
      valuesObject:
        # Image tag intentionally not pinned — it tracks the chart's appVersion,
        # so a single chart bump (via renovate on targetRevision) moves both.

        # ClusterIP + ingress: containerd on the Talos nodes reaches the
        # mirror through Traefik at registry.kirillorlov.pro. ociregistry is
        # a transparent pull-through cache — it derives the upstream from the
        # containerd `ns` query parameter, so a single host fronts docker.io,
        # ghcr.io, quay.io, registry.k8s.io, etc. (no per-registry paths like
        # artifact-keeper needed). Talos `machine.registries.mirrors` wiring
        # lives in talos/talconfig.yaml (currently commented out).
        service:
          type: ClusterIP
          port: 8080
          # Suppress the chart's default NodePort (invalid on a ClusterIP
          # service). Use 0 rather than null: the chart gates the field on
          # `{{- if .Values.service.nodePort }}` (0 is falsy → omitted), and 0
          # survives null-stripping linters.
          nodePort: 0

        # Persist the image cache so a pod restart doesn't cold-start every
        # pull. ReadWriteMany on ceph-filesystem so a rolling update's old and
        # new pod can briefly share the cache volume.
        persistence:
          emptyDir:
            enabled: false
          persistentVolumeClaim:
            enabled: true
            newClaimSpec:
              accessModes:
                - ReadWriteMany
              storageClassName: ceph-filesystem
              resources:
                requests:
                  storage: 50Gi

        # The image runs as distroless `nonroot` (uid/gid 65532). The CephFS
        # PVC mounts root-owned, so without fsGroup the server can't create its
        # cache dirs ("mkdir /var/lib/ociregistry/lts: permission denied").
        # CephFS CSIDriver has fsGroupPolicy=File, so fsGroup is honored.
        podSecurityContext:
          fsGroup: 65532
          fsGroupChangePolicy: OnRootMismatch
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault

        # Rolling update — RWM volume lets the new pod start before the old one
        # terminates (no single-writer contention).
        deploymentStrategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 0
            maxSurge: 1

        # Readiness/liveness probes on the dedicated health port.
        health:
          port: 8081

        # Expose Prometheus metrics and create a ServiceMonitor (the cluster
        # runs the prometheus-operator CRDs).
        metrics:
          port: 2112
        observability:
          enabled: true
          serviceMonitor:
            enabled: true

        # Docker Hub password (a PAT) is injected from a Secret via env so it
        # never lands in the configmap/git. The username isn't a secret, so it
        # stays in the config below. ghcr.io/quay.io/registry.k8s.io stay
        # anonymous — only docker.io rate-limits hard enough to need auth.
        env:
          - name: DOCKERHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: ociregistry-dockerhub
                key: token

        serverConfig:
          configuration:
            logLevel: info
            # Authenticate to Docker Hub to escape the ~10 pulls/hr anonymous
            # limit (the 429s). `passwordFromEnv` reads the PAT from the env var
            # wired above. Other upstreams need no entry (anonymous works).
            registries:
              - name: docker.io
                description: Docker Hub (authenticated to lift rate limits)
                scheme: https
                auth:
                  user: diverofdark
                  passwordFromEnv: DOCKERHUB_TOKEN
            # Re-check upstream for moving tags (e.g. :latest) so the cache
            # doesn't pin a stale digest.
            alwaysPullLatest: true
            # Evict images not accessed in 30d, checked daily, to bound the
            # cache size.
            pruneConfig:
              enabled: true
              type: accessed
              duration: 30d
              frequency: 1d

        ingress:
          enabled: true
          className: traefik
          annotations:
            cert-manager.io/cluster-issuer: acme-issuer
            gethomepage.dev/enabled: "true"
            gethomepage.dev/href: "https://registry.kirillorlov.pro"
            gethomepage.dev/group: Infra
            gethomepage.dev/name: OCIRegistry
            gethomepage.dev/icon: mdi-package-variant
            gethomepage.dev/description: "Pull-through container registry cache"
          hosts:
            - host: registry.kirillorlov.pro
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: ociregistry-tls
              hosts:
                - registry.kirillorlov.pro

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 512Mi

        extraManifests:
          # Import the chart's bundled Grafana dashboards (shipped in the
          # ociregistry-grafana-dashes ConfigMap) via the grafana-operator.
          # configMapRef reads the JSON from that ConfigMap in this namespace;
          # the Grafana instance lives in the `grafana` namespace, hence
          # allowCrossNamespaceImport. Panels resolve against the Prometheus
          # datasource whose uid is pinned to `prometheus` in grafana-operator.yaml.
          - apiVersion: grafana.integreatly.org/v1beta1
            kind: GrafanaDashboard
            metadata:
              name: ociregistry
            spec:
              allowCrossNamespaceImport: true
              instanceSelector:
                matchLabels:
                  dashboards: "grafana"
              configMapRef:
                name: ociregistry-grafana-dashes
                key: ociregistry-dashboard.json
          - apiVersion: grafana.integreatly.org/v1beta1
            kind: GrafanaDashboard
            metadata:
              name: ociregistry-gometrics
            spec:
              allowCrossNamespaceImport: true
              instanceSelector:
                matchLabels:
                  dashboards: "grafana"
              configMapRef:
                name: ociregistry-grafana-dashes
                key: gometrics-dashboard.json

          # Pull the Docker Hub PAT from OpenBao into the Secret that `env`
          # references above. Same pattern as trackhound.yaml.
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: ociregistry-dockerhub
            spec:
              secretStoreRef:
                name: openbao-store
                kind: ClusterSecretStore
              refreshInterval: 1h
              target:
                name: ociregistry-dockerhub
                creationPolicy: Owner
                deletionPolicy: Retain
              data:
                - secretKey: token
                  remoteRef:
                    key: ociregistry
                    property: dockerhub_token

  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
