apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: metallb
  namespace: metallb
spec:
  allowCrossNamespaceImport: true
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  grafanaCom:
    id: 20162
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  ignoreDifferences:
    - group: '*'
      jqPathExpressions:
        - .spec.conversion.webhook.clientConfig.caBundle
      kind: CustomResourceDefinition
  destination:
    namespace: metallb
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: metallb
    repoURL: https://metallb.github.io/metallb
    targetRevision: 0.16.1
    helm:
      values: |
        prometheus:
          serviceAccount: default
          namespace: metallb
          serviceMonitor:
            enabled: true
          prometheusRule:
            enabled: true
        # Chart v0.16.0 turned `frrk8s.enabled: true` into the default, which
        # pulls in the frr-k8s DaemonSet plus a broken subchart values path
        # (`nil pointer evaluating interface {}.serviceMonitor` at render).
        # This cluster is L2-only — `kubectl get bgppeers,bgpadvertisements -A`
        # returns no instances, only an l2advertisement on first-pool — so
        # frr-k8s is pure overhead. Disable the whole subchart.
        frrk8s:
          enabled: false

  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      prune: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
