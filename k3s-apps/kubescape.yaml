apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubescape
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # Multi-source: the kubescape-operator chart manages the storage
  # APIService's caBundle once at install time, but rotates the storage CA
  # on chart upgrades without updating the caBundle field — kube-aggregator
  # then fails TLS to the storage service and the entire spdx.softwarecomposition
  # API goes down (node-agent crashloops, kubevuln stalls). The Kyverno
  # policy in k3s-apps/kubescape/ adds a cert-manager.io/inject-ca-from-secret
  # annotation to the APIService only (broadcasting via additionalAnnotations
  # would also touch the validating webhook, which has a different CA).
  # cert-manager-cainjector then keeps the caBundle in sync with the rotated
  # storage-tls-ca Secret automatically.
  sources:
  - repoURL: https://kubescape.github.io/helm-charts
    chart: kubescape-operator
    targetRevision: 1.40.2
    helm:
      valuesObject:
        clusterName: homelab
        excludeNamespaces: "kubescape,kube-system,kube-public,kube-node-lease,kubeconfig,gmp-system,gmp-public,velero,github-runner,bonsai"
        capabilities:
          continuousScan: enable
          vulnerabilityScan: enable
          nodeScan: enable
          # Disabled: the relevant/non-relevant flows race on the same
          # VulnerabilityManifestSummary name and cause a write storm that
          # pegs the storage apiserver at ~1.2 CPU. Re-enable only after
          # upstream confirms the duplicate-write bug is fixed.
          relevancy: disable
        persistence:
          storageClass: "ceph-block"
          size:
            backingStorage: 25Gi
        # Move full-cluster vuln sweep from daily-at-midnight to weekly
        # (Sunday 02:00) to reduce baseline kubevuln + storage load.
        vulnerabilityScanScheduler:
          scanSchedule: "0 2 * * 0"

  - repoURL: https://github.com/DiverOfDark/homelab.git
    targetRevision: HEAD
    path: k3s-apps/kubescape

  ignoreDifferences:
    - group: ''
      kind: Secret
      jqPathExpressions:
        - '.data'
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - '.webhooks[]?.clientConfig.caBundle'
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - '.spec.conversion'
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - '.metadata.annotations'
    - group: apiregistration.k8s.io
      kind: APIService
      jqPathExpressions:
        - '.spec.caBundle'
    - group: batch
      kind: CronJob
      jqPathExpressions:
        - '.spec.schedule'
  destination:
    server: https://kubernetes.default.svc
    namespace: kubescape
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
