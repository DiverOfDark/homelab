apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: harbor
    server: https://kubernetes.default.svc
  project: default
  # Multi-source: the upstream Harbor chart has no `additionalObjects` hook, so
  # the CNPG Postgres Cluster + the admin/secretKey ExternalSecret live as raw
  # manifests in k3s-apps/harbor/ (a subdir the meta-app ignores — it syncs
  # k3s-apps non-recursively). Both sources deploy into the `harbor` namespace.
  sources:
    - repoURL: https://helm.goharbor.io
      chart: harbor
      targetRevision: 1.19.1
      helm:
        releaseName: harbor
        valuesObject:
          externalURL: https://harbor.kirillorlov.pro

          # Recreate (not RollingUpdate): jobservice has an RWO ceph-block jobLog
          # PVC, so on a rollout the default RollingUpdate starts the new pod
          # before the old releases the volume -> Multi-Attach error, stuck
          # ContainerCreating forever. The goharbor chart only exposes a global
          # updateStrategy, so this also makes core/registry/portal restart fully
          # (brief downtime) instead of rolling on chart bumps -- acceptable for a
          # homelab; steady-state HA (anti-affinity + PDBs) is unaffected.
          updateStrategy:
            type: Recreate

          # HA: 2 replicas per stateless component with soft anti-affinity so
          # the pair lands on different nodes when possible. Redis stays as
          # the chart's internal single-pod StatefulSet — moving multi-DB
          # Harbor onto a Redis Cluster (or Valkey-operator's cluster mode)
          # would require collapsing DBs 0/1/2/5 into one keyspace, which
          # isn't a homelab-scale win. PDBs (k3s-apps/harbor/) gate
          # voluntary evictions to one replica at a time.
          portal:
            replicas: 2
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      topologyKey: kubernetes.io/hostname
                      labelSelector:
                        matchLabels:
                          app: harbor
                          component: portal
                          release: harbor
          core:
            replicas: 2
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      topologyKey: kubernetes.io/hostname
                      labelSelector:
                        matchLabels:
                          app: harbor
                          component: core
                          release: harbor
          jobservice:
            # Kept at 1 replica. Two paths to scale, both have a wall:
            # (1) the chart's jobLog PVC is RWO ceph-block (Multi-Attach
            # error on the second pod), and (2) dropping "file" from
            # jobLoggers makes jobservice panic at startup with "missing
            # logger config of job". For a homelab the single jobservice
            # pod is acceptable — registry/core/portal HA still gives a
            # usable Harbor when this pod is briefly down on reschedule.
            replicas: 1
          registry:
            replicas: 2
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      topologyKey: kubernetes.io/hostname
                      labelSelector:
                        matchLabels:
                          app: harbor
                          component: registry
                          release: harbor

          expose:
            type: ingress
            tls:
              enabled: true
              # cert-manager fills harbor-tls from the ingress (cluster-issuer
              # annotation below); the chart just references the secret name.
              certSource: secret
              secret:
                secretName: harbor-tls
            ingress:
              hosts:
                core: harbor.kirillorlov.pro
              className: traefik
              annotations:
                cert-manager.io/cluster-issuer: acme-issuer
                gethomepage.dev/enabled: "true"
                gethomepage.dev/href: "https://harbor.kirillorlov.pro"
                gethomepage.dev/group: Infra
                gethomepage.dev/name: Harbor
                gethomepage.dev/icon: harbor.png
                gethomepage.dev/description: "Container registry"
                gethomepage.dev/pod-selector: "app.kubernetes.io/name=harbor,component=core"

          # Image layers on S3 (Ceph RGW), not CephFS. CephFS-backed image
          # layers were fragile: when the MDS hiccups (seen multiple times
          # today across asgard / jotunheimr / niflheimr), inode lookups
          # hang for 20+ minutes, which made ociregistry's same pattern
          # unusable. RGW writes go straight to OSDs with no metadata
          # service in the path. The bucket + credentials come from the
          # ObjectBucketClaim in k3s-apps/harbor/obc.yaml; Kyverno
          # (k3s-apps/harbor/obc-secret-policy.yaml) re-projects the OBC's
          # AWS_*-keyed secret into REGISTRY_STORAGE_S3_*-keyed form which
          # is what the registry pod's envFrom expects via existingSecret.
          #
          # disableredirect: true so the registry proxies the bytes itself
          # instead of redirecting clients to the in-cluster RGW URL,
          # which clients outside the cluster can't reach.
          persistence:
            enabled: true
            imageChartStorage:
              disableredirect: true
              type: s3
              s3:
                existingSecret: harbor-registry-s3
                region: us-east-1
                bucket: harbor-registry
                regionendpoint: http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local:80
                secure: false
                v4auth: true
            persistentVolumeClaim:
              jobservice:
                jobLog:
                  storageClass: ceph-block
                  accessMode: ReadWriteOnce
                  size: 5Gi
              redis:
                storageClass: ceph-block
                accessMode: ReadWriteOnce
                size: 5Gi
              trivy:
                storageClass: ceph-block
                accessMode: ReadWriteOnce
                size: 5Gi

          # External Postgres via CloudNativePG (k3s-apps/harbor/cluster.yaml).
          # The chart reads the `password` key from the CNPG-generated secret.
          database:
            type: external
            external:
              host: harbor-db-rw.harbor.svc.cluster.local
              port: "5432"
              username: harbor
              coreDatabase: harbor
              existingSecret: harbor-db-app
              sslmode: disable

          # Redis: chart-internal is fine for a homelab.
          redis:
            type: internal

          # Admin password + the 16-char secretKey (used to encrypt registry
          # creds at rest — MUST be stable across syncs) come from OpenBao,
          # written by terraform/harbor.tf. Secret keys: HARBOR_ADMIN_PASSWORD
          # and secretKey (see k3s-apps/harbor/externalsecret.yaml).
          existingSecretAdminPassword: harbor-secrets
          existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
          existingSecretSecretKey: harbor-secrets

          trivy:
            enabled: true
            replicas: 2
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      topologyKey: kubernetes.io/hostname
                      labelSelector:
                        matchLabels:
                          app: harbor
                          component: trivy
                          release: harbor

          metrics:
            enabled: true
            serviceMonitor:
              enabled: true

    - repoURL: https://github.com/DiverOfDark/homelab.git
      targetRevision: HEAD
      path: k3s-apps/harbor

  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
