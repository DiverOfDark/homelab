apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: 12.0.0
    helm:
      valuesObject:
        nodeAgent:
          extraArgs:
            - --resource-timeout=2h
            - --data-mover-prepare-timeout=2h
        kubectl:
          image:
            repository: public.ecr.aws/bitnami/kubectl

        extraObjects:
          - apiVersion: v1
            kind: ConfigMap
            metadata:
              name: resource-policy-configmap
              namespace: velero
            data:
              resource-policy.yaml: |
                # currently only supports v1 version
                version: v1
                volumePolicies:
                - conditions:
                    pvcLabels:
                      velero.io/exclude-from-backup: "true"
                  action:
                    type: skip
                - conditions:
                    # nfs could be empty which matches any nfs volume source
                    nfs: {}
                  action:
                    type: skip
                - conditions:
                    volumeTypes:
                      - emptyDir
                      - downwardAPI
                      - configmap
                      - cinder
                  action:
                    type: skip
                - conditions:
                    pvcLabels:
                      velero.io/backup-type: "snapshot"
                  action:
                    type: snapshot
                - conditions: {}
                  action:
                    type: fs-backup

          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: "velero-repo-secret"
              namespace: velero
            spec:
              secretStoreRef:
                name: openbao-store
                kind: ClusterSecretStore
              refreshInterval: "1h"
              target:
                name: velero-repo-credentials
                creationPolicy: Owner
                deletionPolicy: Retain
                template:
                  type: Opaque
                  data:
                    repository-password: "{{`{{ .encryption }}`}}"
              data:
                - secretKey: encryption
                  remoteRef:
                    key: velero
                    property: encryption
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: "velero-secret"
              namespace: velero
            spec:
              secretStoreRef:
                name: openbao-store
                kind: ClusterSecretStore
              refreshInterval: "1h"
              target:
                name: velero-credentials
                creationPolicy: Owner
                deletionPolicy: Retain
                template:
                  type: Opaque
                  data:
                    cloud: |
                      [default]
                      aws_access_key_id="{{`{{ .archer_s3_access_key }}`}}"
                      aws_secret_access_key="{{`{{ .archer_s3_secret_key }}`}}"
                    SECURITY_TOKEN_KEY: "{{`{{ .velero_ui_security_token_key }}`}}"
                    AWS_ACCESS_KEY_ID: "{{`{{ .archer_s3_access_key }}`}}"
                    AWS_SECRET_ACCESS_KEY: "{{`{{ .archer_s3_secret_key }}`}}"
                    RESTIC_PASSWORD: "{{`{{ .encryption }}`}}"
                    OAUTH_KEY: "{{`{{ .password }}`}}"
                    SECURITY_PATH_DATABASE: "./data"
                    DEFAULT_ADMIN_USERNAME: "admin"
                    DEFAULT_ADMIN_PASSWORD: "admin"
              data:
                - secretKey: password
                  remoteRef:
                    key: velero
                    property: oauth
                - secretKey: archer_s3_access_key
                  remoteRef:
                    key: velero
                    property: access_key
                - secretKey: archer_s3_secret_key
                  remoteRef:
                    key: velero
                    property: secret_key
                - secretKey: velero_ui_security_token_key
                  remoteRef:
                    key: velero
                    property: security_token
                - secretKey: encryption
                  remoteRef:
                    key: velero
                    property: encryption
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: "velero-wasabi-secret"
              namespace: velero
            spec:
              secretStoreRef:
                name: openbao-store
                kind: ClusterSecretStore
              refreshInterval: "1h"
              target:
                name: velero-wasabi-credentials
                creationPolicy: 'Owner'
                deletionPolicy: "Retain"
                template:
                  type: Opaque
                  data:
                    cloud: |
                      [default]
                      aws_access_key_id={{`{{ .access_key }}`}}
                      aws_secret_access_key={{`{{ .secret_key }}`}}
              data:
                - secretKey: access_key
                  remoteRef:
                    key: wasabi
                    property: access_key
                - secretKey: secret_key
                  remoteRef:
                    key: wasabi
                    property: secret_key
        credentials:
          useSecret: true
          existingSecret: velero-credentials

        configuration:
          itemBlockWorkerCount: 2
          backupStorageLocation:
          - name: default
            provider: aws
            bucket: ceph-backups
            config:
              region: us-east-1
              s3ForcePathStyle: true
              s3Url: https://yggdrasil.kirillorlov.pro/
          - name: wasabi
            provider: aws
            bucket: diverofdark-homelab-backup
            credential:
              name: velero-wasabi-credentials
              key: cloud
            config:
              region: eu-central-2
              s3ForcePathStyle: true
              s3Url: https://s3.eu-central-2.wasabisys.com
          volumeSnapshotLocation:
          - name: default
            provider: aws
            bucket: ceph-backups
            config:
              region: default
              s3ForcePathStyle: true
              s3Url: https://yggdrasil.kirillorlov.pro/
          - name: wasabi
            provider: aws
            bucket: diverofdark-homelab-backup
            credential:
              name: velero-wasabi-credentials
              key: cloud
            config:
              region: eu-central-2
              s3ForcePathStyle: true
              s3Url: https://s3.eu-central-2.wasabisys.com
          features: EnableCSI
        deployNodeAgent: true
        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.14.0
            imagePullPolicy: IfNotPresent
            volumeMounts:
              - mountPath: /target
                name: plugins
        schedules:
          talos:
            disabled: false
            schedule: "0 0 * * *" ## choose time, when scheduled backups will be make.
            template:
              ttl: "240h" ## choose ttl, after which the backups will be removed.
              excludedNamespaces:
                - github-runner
              snapshotVolumes: true
              snapshotMoveData: true
              defaultVolumesToFsBackup: true
              itemOperationTimeout: "1h"
              resourcePolicy:
                kind: configmap
                name: resource-policy-configmap
              uploaderConfig:
                parallelFilesUpload: 10
              metadata:
                labels: # reset labels to not show backups in ArgoCD
                  app.kubernetes.io/instance: ""
                  app.kubernetes.io/managed-by: ""
                  app.kubernetes.io/name: ""
                  argocd.argoproj.io/instance: ""
          talos-wasabi:
            disabled: false
            schedule: "0 12 * * *" ## 12 hour after yggdrasil backup
            template:
              storageLocation: wasabi
              volumeSnapshotLocations:
               - wasabi
              ttl: "240h"
              excludedNamespaces:
                - github-runner
              snapshotVolumes: true
              snapshotMoveData: true
              defaultVolumesToFsBackup: true
              itemOperationTimeout: "1h"
              resourcePolicy:
                kind: configmap
                name: resource-policy-configmap
              uploaderConfig:
                parallelFilesUpload: 10
              metadata:
                labels:
                  app.kubernetes.io/instance: ""
                  app.kubernetes.io/managed-by: ""
                  app.kubernetes.io/name: ""
                  argocd.argoproj.io/instance: ""
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        reloader.stakater.com/auto: "true"
        pod-security.kubernetes.io/enforce: privileged
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: veleroui
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.otwld.com/
    chart: velero-ui
    targetRevision: 0.14.0
    helm:
      valuesObject:
        configuration:
          general:
            grafanaUrl: https://grafana.kirillorlov.pro/
            secretPassPhrase:
              existingSecret: velero-credentials
        ingress:
          annotations:
            cert-manager.io/cluster-issuer: acme-issuer
          enabled: true
          ingressClassName: traefik
          hosts:
            - host: velero.kirillorlov.pro
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - hosts:
                - velero.kirillorlov.pro
              secretName: velero-tls
        livenessProbe:
          enabled: false
        readinessProbe:
          enabled: false
        env:
          - name: OAUTH_AUTH_ENABLED
            value: "true"
          - name: OAUTH_NAME
            value: "Homelab"
          - name: OAUTH_AUTHORIZATION_URL
            value: "https://auth.kirillorlov.pro/oauth/v2/authorize"
          - name: OAUTH_USER_INFO_URL
            value: "https://auth.kirillorlov.pro/oidc/v1/userinfo"
          - name: OAUTH_TOKEN_URL
            value: "https://auth.kirillorlov.pro/oauth/v2/token"
          - name: OAUTH_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: velero-zitadel
                key: client_id
          - name: OAUTH_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: velero-zitadel
                key: client_secret
          - name: OAUTH_OAUTH_SCOPE
            value: "openid email profile"
          - name: OAUTH_REDIRECT_URI
            value: "https://velero.kirillorlov.pro/login"

  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
---