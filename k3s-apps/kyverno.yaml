apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: kyverno
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: kyverno
    repoURL: https://kyverno.github.io/kyverno/
    targetRevision: 3.8.0
    helm:
      valuesObject:
        admissionController:
          replicas: 2
          # Read access to the CNPG Cluster trigger so the admission
          # controller can build generate requests for the backup policy.
          rbac:
            clusterRole:
              extraResources:
                - apiGroups: ["postgresql.cnpg.io"]
                  resources: ["clusters"]
                  verbs: ["get", "list", "watch"]
        backgroundController:
          replicas: 2
          # The background controller fulfils the generate policy: it reads
          # CNPG Clusters and creates/syncs the ObjectStore, ScheduledBackup
          # and ExternalSecret resources in each cluster's namespace.
          rbac:
            clusterRole:
              extraResources:
                - apiGroups: ["postgresql.cnpg.io"]
                  resources: ["clusters"]
                  verbs: ["get", "list", "watch"]
                - apiGroups: ["postgresql.cnpg.io"]
                  resources: ["scheduledbackups"]
                  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
                - apiGroups: ["barmancloud.cnpg.io"]
                  resources: ["objectstores"]
                  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
                - apiGroups: ["external-secrets.io"]
                  resources: ["externalsecrets"]
                  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        reportsController:
          replicas: 1
        cleanupController:
          replicas: 1
  syncPolicy:
    automated:
      prune: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
