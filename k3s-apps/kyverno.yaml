apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: kyverno
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: kyverno
    repoURL: https://kyverno.github.io/kyverno/
    targetRevision: 3.8.0
    helm:
      valuesObject:
        # Kyverno's policy-validation webhook checks that BOTH the admission
        # and background controllers hold permissions for every resource the
        # generate policy touches, so both get the same extraResources block.
        admissionController:
          replicas: 2
          rbac:
            clusterRole:
              extraResources: &cnpgBackupRbac
                - apiGroups: ["postgresql.cnpg.io"]
                  resources: ["clusters"]
                  verbs: ["get", "list", "watch"]
                - apiGroups: ["postgresql.cnpg.io"]
                  resources: ["scheduledbackups"]
                  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
                - apiGroups: ["barmancloud.cnpg.io"]
                  resources: ["objectstores"]
                  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
                - apiGroups: ["external-secrets.io"]
                  resources: ["externalsecrets"]
                  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        backgroundController:
          replicas: 2
          rbac:
            clusterRole:
              extraResources: *cnpgBackupRbac
        reportsController:
          replicas: 1
        cleanupController:
          replicas: 1
  syncPolicy:
    automated:
      prune: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
