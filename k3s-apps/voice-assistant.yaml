apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voice-assistant
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: voice-assistant
    server: https://kubernetes.default.svc
  project: default
  source:
    # Pipecat voice assistant — Helm chart lives in its own repo.
    repoURL: https://github.com/DiverOfDark/pipecat-voice-assistant.git
    targetRevision: HEAD
    path: chart
    helm:
      releaseName: voice-assistant
      parameters:
        - name: image.tag
          value: sha-$ARGOCD_APP_REVISION_SHORT
      valuesObject:
        # Local LLM — Hermes runs on a KubeVirt VM in this cluster.
        hermes:
          baseUrl: http://hermes-api.kubevirt-vms.svc.cluster.local:8642/v1
          model: hermes-agent
          apiKey:
            externalSecret:
              enabled: true
              store: openbao-store
              storeKind: ClusterSecretStore
              refreshInterval: "1h"
              remoteKey: voice-assistant/hermes
              property: api_key
        whisper:
          model: deepdml/faster-whisper-large-v3-turbo-ct2
          computeType: int8
          ompThreads: 6
        piper:
          voice: ru_RU-ruslan-medium
        esp32Compat: true
        # WebRTC TURN relay — STUNner operator from k3s-apps/stunner.yaml.
        # 192.168.179.21 is a free IP in the MetalLB pool.
        stunner:
          turnUri: turn:192.168.179.21:3478?transport=udp
          loadBalancerIP: "192.168.179.21"
          auth:
            username: voiceassistant
            externalSecret:
              enabled: true
              store: openbao-store
              storeKind: ClusterSecretStore
              refreshInterval: "1h"
              remoteKey: voice-assistant/turn
              usernameProperty: username
              passwordProperty: password
        persistence:
          size: 8Gi
          storageClassName: ceph-block
        ingress:
          enabled: true
          className: traefik
          host: voice-assistant.kirillorlov.pro
          annotations:
            cert-manager.io/cluster-issuer: acme-issuer
            gethomepage.dev/enabled: "true"
            gethomepage.dev/href: "https://voice-assistant.kirillorlov.pro"
            gethomepage.dev/group: Apps
            gethomepage.dev/name: Voice Assistant
          tls:
            enabled: true
        resources:
          # No cpu limits — let Whisper / Piper burst freely on asgard's
          # spare cores (CFS throttling hurts tail latency more than it helps
          # noisy-neighbour isolation here). Memory limits stay.
          bot:
            requests:
              cpu: "50m"
              memory: 4Gi
            limits:
              memory: 10Gi
          initContainer:
            requests:
              cpu: "500m"
              memory: 2Gi
            limits:
              memory: 6Gi
        # Pin to asgard — has the most CPU/memory headroom; matches the
        # repo's nodeSelector pattern (k3s-userapps/github-runner/shared-dind.yaml).
        # asgard is untainted, so no tolerations needed.
        nodeSelector:
          kubernetes.io/hostname: asgard
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
