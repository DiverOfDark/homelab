apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victorialogs
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: victorialogs
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: victoria-logs-single
    repoURL: https://victoriametrics.github.io/helm-charts/
    targetRevision: 0.12.5
    helm:
      valuesObject:
        # -- Values for [vector helm chart](https://github.com/vectordotdev/helm-charts/tree/develop/charts/vector)
        vector:
          # -- Enable deployment of vector
          enabled: true
          role: Agent
          # midgard (Hetzner edge worker) — collect its service logs too; its
          # Talos machine.logging targets node-local hostPort 5050, which works
          # anywhere. (kmsg → MetalLB VIP silently drops from the edge; accepted.)
          tolerations:
            - key: "edge"
              operator: "Equal"
              value: "true"
              effect: "NoSchedule"
          dataDir: /vector-data-dir
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 4Gi
          podMonitor:
            enabled: true
          args:
            - -w
            - --config-dir
            - /etc/vector/
          containerPorts:
            - name: prom-exporter
              containerPort: 9090
              protocol: TCP
            - name: kernel-logs
              containerPort: 5051
              hostPort: 5051
              protocol: UDP
            - name: logs
              containerPort: 5050
              hostPort: 5050
              protocol: UDP
          # Expose the kernel-log UDP listener (5051) on a stable MetalLB VIP so
          # Talos ships kmsg to a REMOTE vector. Sending a panic to the node's
          # own loopback vector loses it on reboot (the pod dies with the node);
          # a VIP held by a healthy node lets the panic packet egress the dying
          # node's NIC before it halts, so it survives in VictoriaLogs. Service
          # logs (5050) stay node-local via hostPort — only kmsg needs this.
          service:
            enabled: true
            type: LoadBalancer
            externalTrafficPolicy: Cluster
            annotations:
              metallb.universe.tf/loadBalancerIPs: 192.168.179.13
            ports:
              - name: kernel-logs
                port: 5051
                targetPort: 5051
                protocol: UDP
          # -- Forces custom configuration creation in a given namespace even if vector.enabled is false
          customConfigNamespace: ""
          customConfig:
            data_dir: /vector-data-dir
            api:
              enabled: false
              address: 0.0.0.0:8686
            sources:
              k8s:
                type: kubernetes_logs
              internal_metrics:
                type: internal_metrics
              talos_kernel_logs:
                address: 0.0.0.0:5050
                type: socket
                mode: udp
                max_length: 102400
                decoding:
                  codec: json
                host_key: __host

              talos_service_logs:
                address: 0.0.0.0:5051
                type: socket
                mode: udp
                max_length: 102400
                decoding:
                  codec: json
                host_key: __host

            transforms:
              parser:
                type: remap
                inputs: [ k8s ]
                source: |
                  .log = parse_json(.message) ?? .message
                  del(.message)

              parser_talos:
                type: remap
                inputs: [ talos_kernel_logs, talos_service_logs ]
                source: |
                  .log = parse_json(.message) ?? .message
                  del(.message)
            sinks:
              exporter:
                type: prometheus_exporter
                address: 0.0.0.0:9090
                inputs: [ internal_metrics ]
              vlogs:
                type: elasticsearch
                inputs: [ parser ]
                endpoints: << include "vlogs.es.urls" . >>
                mode: bulk
                api_version: v8
                compression: gzip
                healthcheck:
                  enabled: false
                request:
                  headers:
                    VL-Time-Field: timestamp
                    VL-Stream-Fields: stream,kubernetes.pod_name,kubernetes.container_name,kubernetes.pod_namespace
                    VL-Msg-Field: message,msg,_msg,log.msg,log.message,log
                    AccountID: "0"
                    ProjectID: "0"

              talos_kernel:
                type: elasticsearch
                inputs:
                  - parser_talos
                endpoints: << include "vlogs.es.urls" . >>
                api_version: v8
                compression: gzip
                batch:
                  max_bytes: 1048576
                request:
                  headers:
                    VL-Time-Field: timestamp,talos-time
                    VL-Stream-Fields: talos-service,facility,user
                    VL-Msg-Field: message,msg,_msg,log.msg,log.message,log
                    AccountID: "0"
                    ProjectID: "0"

        podDisruptionBudget:
          enabled: true
          minAvailable: 1
        server:
          replicaCount: 2
          retentionPeriod: 7d
          retentionDiskSpaceUsage: 15 # GB

          persistentVolume:
            enabled: true
            storageClassName: ceph-block
            size: 10Gi

          ingress:
            enabled: true
            annotations:
              cert-manager.io/cluster-issuer: acme-issuer
              gethomepage.dev/enabled: "true"
              gethomepage.dev/href: "https://vlogs.kirillorlov.pro"
              gethomepage.dev/group: Infra
              gethomepage.dev/name: Victoria Logs
              gethomepage.dev/icon: victoriametrics.svg
              gethomepage.dev/pod-selector: "app.kubernetes.io/instance=victorialogs"
            hosts:
              - name: vlogs.kirillorlov.pro
                path:
                  - /
                port: http
            tls:
              - secretName: vmselect-ingress-tls
                hosts:
                  - vlogs.kirillorlov.pro
            ingressClassName: "traefik"
            pathType: Prefix
          serviceMonitor:
            enabled: true
        dashboards:
          enabled: true
          grafanaOperator:
            enabled: true
            spec:
              instanceSelector:
                matchLabels:
                  dashboards: "grafana"
              allowCrossNamespaceImport: true
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      prune: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
