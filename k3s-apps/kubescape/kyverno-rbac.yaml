# Kyverno's admission-controller validates the policy at apply time and
# rejects it unless both controllers' SAs already have the verbs the
# policy will need (get/update on apiregistration.k8s.io/APIService for
# the mutate.targets path).
#
# Kyverno picks up additional ClusterRoles via the well-known
# aggregation labels.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:apiservice-reader
  labels:
    rbac.kyverno.io/aggregate-to-admission-controller: "true"
    rbac.kyverno.io/aggregate-to-background-controller: "true"
rules:
  - apiGroups: ["apiregistration.k8s.io"]
    resources: ["apiservices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:apiservice-writer
  labels:
    rbac.kyverno.io/aggregate-to-background-controller: "true"
rules:
  - apiGroups: ["apiregistration.k8s.io"]
    resources: ["apiservices"]
    verbs: ["update", "patch"]
