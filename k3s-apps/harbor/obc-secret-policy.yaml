# Kyverno generate rule that mirrors the OBC's standard AWS_*-named
# credential keys into the env-var key names Harbor's registry pod
# envFroms via its existingSecret reference.
#
# Why this exists: Rook's ObjectBucketClaim provisioner produces a Secret
# named after the OBC with these keys (lib-bucket-provisioner convention):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
# Harbor's registry deployment expects:
#   REGISTRY_STORAGE_S3_ACCESSKEY
#   REGISTRY_STORAGE_S3_SECRETKEY
# rather than patch the chart, we project the values into a sibling
# Secret called "harbor-registry-s3" with the right names. The chart's
# persistence.imageChartStorage.s3.existingSecret points at that one.
#
# synchronize: true keeps the destination in sync if the OBC's keys
# rotate (e.g. via radosgw-admin user key regen).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: harbor-s3-credentials-from-obc
  annotations:
    policies.kyverno.io/title: Harbor S3 credentials from OBC
    policies.kyverno.io/category: Other
    policies.kyverno.io/subject: Secret
    policies.kyverno.io/description: |
      Projects Rook OBC's AWS_*-named credential secret into a sibling
      Secret with the REGISTRY_STORAGE_S3_* env-var key names that the
      Harbor registry pod's envFrom expects.
spec:
  generateExisting: true
  rules:
    - name: project-into-registry-secret
      match:
        any:
          - resources:
              kinds: ["Secret"]
              names: ["harbor-registry"]
              namespaces: ["harbor"]
      generate:
        synchronize: true
        apiVersion: v1
        kind: Secret
        name: harbor-registry-s3
        namespace: harbor
        data:
          type: Opaque
          data:
            REGISTRY_STORAGE_S3_ACCESSKEY: "{{ request.object.data.AWS_ACCESS_KEY_ID }}"
            REGISTRY_STORAGE_S3_SECRETKEY: "{{ request.object.data.AWS_SECRET_ACCESS_KEY }}"
