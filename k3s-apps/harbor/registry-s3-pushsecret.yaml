# Bridge OBC's AWS_*-keyed Secret → OpenBao → Harbor-formatted Secret
#
# Step 1 (this file): PushSecret reads the harbor-registry Secret that
# Rook's lib-bucket-provisioner created from k3s-apps/harbor/obc.yaml
# and writes its contents into OpenBao at secret/harbor/s3 — renaming
# the keys along the way to the names Harbor's registry pod expects
# (REGISTRY_STORAGE_S3_ACCESSKEY / REGISTRY_STORAGE_S3_SECRETKEY).
#
# Step 2 (registry-s3-externalsecret.yaml): a regular ExternalSecret
# pulls those values back out of OpenBao and materializes a
# `harbor-registry-s3` Secret in this namespace with the right key
# names. harbor.yaml's persistence.imageChartStorage.s3.existingSecret
# points at that one.
#
# Why this two-hop dance instead of a direct projection: the ESO
# Kubernetes provider would also work but requires its own SA + Role
# binding to read across-namespace. The cluster already has an
# OpenBao ClusterSecretStore wired up with read/write capability,
# so reusing it for both legs keeps the auth path identical to every
# other secret in the cluster — no new provider, no extra RBAC.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: harbor-registry-s3
  namespace: harbor
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: openbao-store
      kind: ClusterSecretStore
  selector:
    secret:
      name: harbor-registry-bucket
  # Recreate the OpenBao secret if the source Secret's contents drift
  # (credential rotation, bucket recreation).
  updatePolicy: Replace
  deletionPolicy: Delete
  data:
    # conversionStrategy: None is the controller's default; declared
    # explicitly so Argo doesn't keep flagging the autodefaulted field
    # as drift on every reconcile.
    - conversionStrategy: None
      match:
        secretKey: AWS_ACCESS_KEY_ID
        remoteRef:
          remoteKey: harbor/s3
          property: REGISTRY_STORAGE_S3_ACCESSKEY
    - conversionStrategy: None
      match:
        secretKey: AWS_SECRET_ACCESS_KEY
        remoteRef:
          remoteKey: harbor/s3
          property: REGISTRY_STORAGE_S3_SECRETKEY
