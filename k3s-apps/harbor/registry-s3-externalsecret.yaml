# Pulls the S3 credentials that PushSecret (registry-s3-pushsecret.yaml)
# wrote into OpenBao back out into a Kubernetes Secret in this namespace
# with the env-var key names that Harbor's registry pod's envFrom
# expects (set as `existingSecret` on the chart in harbor.yaml).
#
# Same OpenBao ClusterSecretStore as the rest of Harbor's secret plumbing
# (admin password, secret key in harbor-secrets) — no separate provider.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-registry-s3
  namespace: harbor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-store
    kind: ClusterSecretStore
  target:
    name: harbor-registry-s3
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: REGISTRY_STORAGE_S3_ACCESSKEY
      remoteRef:
        key: harbor/s3
        property: REGISTRY_STORAGE_S3_ACCESSKEY
    - secretKey: REGISTRY_STORAGE_S3_SECRETKEY
      remoteRef:
        key: harbor/s3
        property: REGISTRY_STORAGE_S3_SECRETKEY
