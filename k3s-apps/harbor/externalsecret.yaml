apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-core
  namespace: harbor
spec:
  secretStoreRef:
    name: openbao-store
    kind: ClusterSecretStore
  refreshInterval: 1h
  target:
    name: harbor-core
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # Both values are generated + written to OpenBao `secret/harbor` by
    # terraform/harbor.tf. secretKey must stay stable or Harbor can't decrypt
    # stored registry credentials.
    - secretKey: HARBOR_ADMIN_PASSWORD
      remoteRef:
        key: harbor
        property: admin_password
    - secretKey: secretKey
      remoteRef:
        key: harbor
        property: secret_key
