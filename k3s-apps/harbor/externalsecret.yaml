apiVersion: external-secrets.io/v1
kind: ExternalSecret
# NB: must NOT be named harbor-core / harbor-registry / harbor-jobservice etc.
# — those names are generated by the Harbor chart. Collision wipes the chart's
# own keys (secret, tls.*) and the pods fail with "couldn't find key secret".
metadata:
  name: harbor-secrets
  namespace: harbor
spec:
  secretStoreRef:
    name: openbao-store
    kind: ClusterSecretStore
  refreshInterval: 1h
  target:
    name: harbor-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # Both values are generated + written to OpenBao `secret/harbor` by
    # terraform/harbor.tf. secretKey must stay stable or Harbor can't decrypt
    # stored registry credentials.
    - secretKey: HARBOR_ADMIN_PASSWORD
      remoteRef:
        key: harbor
        property: admin_password
    - secretKey: secretKey
      remoteRef:
        key: harbor
        property: secret_key
