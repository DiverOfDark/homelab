apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: prometheus
spec:
  secretStoreRef:
    name: openbao-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  target:
    name: alertmanager-config
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          inhibit_rules:
            - source_matchers:
                - 'severity = critical'
              target_matchers:
                - 'severity =~ warning|info'
              equal:
                - 'namespace'
                - 'alertname'
            - source_matchers:
                - 'severity = warning'
              target_matchers:
                - 'severity = info'
              equal:
                - 'namespace'
                - 'alertname'
            - source_matchers:
                - 'alertname = InfoInhibitor'
              target_matchers:
                - 'severity = info'
              equal:
                - 'namespace'
            - target_matchers:
                - 'alertname = InfoInhibitor'
          route:
            group_by: ['namespace']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 12h
            receiver: 'telegram-homelab'
            routes:
              - receiver: 'null'
                matchers:
                  - alertname = "Watchdog"
          receivers:
            - name: 'null'
            - name: 'telegram-homelab'
              telegram_configs:
                - bot_token: '{{ .telegramBotToken }}'
                  chat_id: {{ .telegramChatId }}
                  send_resolved: true
          templates:
            - '/etc/alertmanager/config/*.tmpl'
  data:
    - secretKey: telegramBotToken
      remoteRef:
        key: alertmanager
        property: telegram_bot_token
    - secretKey: telegramChatId
      remoteRef:
        key: alertmanager
        property: telegram_chat_id
