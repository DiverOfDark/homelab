apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: prometheus
spec:
  secretStoreRef:
    name: openbao-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  target:
    name: alertmanager-config
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          inhibit_rules:
            - source_matchers:
                - 'severity = critical'
              target_matchers:
                - 'severity =~ warning|info'
              equal:
                - 'namespace'
                - 'alertname'
            - source_matchers:
                - 'severity = warning'
              target_matchers:
                - 'severity = info'
              equal:
                - 'namespace'
                - 'alertname'
            - source_matchers:
                - 'alertname = InfoInhibitor'
              target_matchers:
                - 'severity = info'
              equal:
                - 'namespace'
            - target_matchers:
                - 'alertname = InfoInhibitor'
          route:
            group_by: ['namespace']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 12h
            receiver: 'telegram-homelab'
            routes:
              - receiver: 'null'
                matchers:
                  - alertname = "Watchdog"
          receivers:
            - name: 'null'
            - name: 'telegram-homelab'
              telegram_configs:
                - bot_token: '{{ .telegramBotToken }}'
                  chat_id: {{ .telegramChatId }}
                  message_thread_id: 20
                  parse_mode: 'HTML'
                  send_resolved: true
                  message: |
                    {{- $status := .Status | toUpper -}}
                    {{- $isFiring := eq .Status "firing" -}}
                    <b>{{ if $isFiring }}🚨{{ else }}✅{{ end }} {{ $status }}</b>
                    <b>Namespace:</b> {{ .GroupLabels.namespace }}
                    <b>Alerts:</b> {{ len .Alerts }}
                    {{- if .CommonLabels.severity }}
                    <b>Severity:</b> {{ .CommonLabels.severity }}
                    {{- end }}

                    {{- range .Alerts }}
                    
                    <b>{{ .Labels.alertname }}</b>{{ if .Labels.instance }} <code>{{ .Labels.instance }}</code>{{ end }}
                    {{- if .Annotations.summary }}
                    {{ .Annotations.summary }}
                    {{- else if .Annotations.message }}
                    {{ .Annotations.message }}
                    {{- else if .Annotations.description }}
                    {{ .Annotations.description }}
                    {{- end }}
                    {{- if .Labels.pod }}
                    <b>Pod:</b> <code>{{ .Labels.pod }}</code>
                    {{- end }}
                    {{- if .Labels.node }}
                    <b>Node:</b> <code>{{ .Labels.node }}</code>
                    {{- end }}
                    {{- if .Labels.job }}
                    <b>Job:</b> <code>{{ .Labels.job }}</code>
                    {{- end }}
                    {{- if .GeneratorURL }}
                    <a href="{{ .GeneratorURL }}">source</a>
                    {{- end }}
                    {{- end }}
          templates:
            - '/etc/alertmanager/config/*.tmpl'
  data:
    - secretKey: telegramBotToken
      remoteRef:
        key: alertmanager
        property: telegram_bot_token
    - secretKey: telegramChatId
      remoteRef:
        key: alertmanager
        property: telegram_chat_id
