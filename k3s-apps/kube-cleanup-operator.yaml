apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-cleanup-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: kube-cleanup-operator
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: kube-cleanup-operator
    repoURL:  https://charts.lwolf.org/
    targetRevision: 1.0.4
    helm:
       valuesObject:
         rbac:
           global: true
         serviceMonitor:
           enabled: true
         args:
           - --delete-successful-after=15m
           - --delete-failed-after=120m
           - --delete-pending-pods-after=60m
           - --delete-evicted-pods-after=60m
           - --delete-orphaned-pods-after=60m
           - --legacy-mode=false
           # In non-legacy mode the operator only deletes pods when
           # (live_count > keep-N) AND (age > delete-after). All three
           # keep-* flags default to -1 ("keep all, never delete"), so
           # the delete-after thresholds above had no effect on failed,
           # pending, or evicted pods — they accumulated forever. Set
           # to 0 so the age-based deletion actually fires.
           - --keep-failures=0
           - --keep-pending=0
  syncPolicy:
    automated:
      prune: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
