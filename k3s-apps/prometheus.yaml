apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: prometheus
    server: https://kubernetes.default.svc
  project: default
  ignoreDifferences:
    - group: '*'
      jqPathExpressions:
        - .data."admin-user"
        - .data."admin-password"
      kind: Secret
    - group: '*'
      jqPathExpressions:
        - .metadata.annotations."gethomepage.dev/widget.password"
      kind: Ingress
  source:
    chart: kube-prometheus-stack
    helm:
      valuesObject:
        crds:
          enabled: false

        prometheus-node-exporter:
          tolerations: 
            - key: "weakling"
              operator: "Equal"
              value: "true"
              effect: "NoSchedule"
            - key: "weakling"
              operator: "Equal"
              value: "true"
              effect: "NoExecute"
        defaultRules:
          rules:
            kubeProxy: false
          disabled:
            KubeClientCertificateExpiration: true
        kubeProxy:
          enabled: false
        kubeEtcd:
          enabled: false
        alertmanager:
          ingress:
            enabled: true
            hosts:
              - alertmanager.kirillorlov.pro
            tls: 
            - secretName: alertmanager-secret
              hosts:
                - alertmanager.kirillorlov.pro
            annotations:
              cert-manager.io/cluster-issuer: "acme-issuer"
              gethomepage.dev/enabled: "true"
              gethomepage.dev/href: "https://alertmanager.kirillorlov.pro"
              gethomepage.dev/group: Cluster Management
              gethomepage.dev/name: Alertmanager
              gethomepage.dev/icon: alertmanager.png
              gethomepage.dev/pod-selector: "app.kubernetes.io/name=alertmanager"
          templateFiles:
            telegram.tmpl: |-
              {{ define "telegram.message" }}
              {{- $status := .Status | toUpper -}}
              {{- $isFiring := eq .Status "firing" -}}
              <b>{{ if $isFiring }}🚨{{ else }}✅{{ end }} {{ $status }}</b>
              <b>Namespace:</b> {{ .GroupLabels.namespace }}
              <b>Alerts:</b> {{ len .Alerts }}
              {{- if .CommonLabels.severity }}
              <b>Severity:</b> {{ .CommonLabels.severity }}
              {{- end }}

              {{- range .Alerts }}

              <b>{{ .Labels.alertname }}</b>{{ if .Labels.instance }} <code>{{ .Labels.instance }}</code>{{ end }}
              {{- if .Annotations.summary }}
              {{ .Annotations.summary }}
              {{- else if .Annotations.message }}
              {{ .Annotations.message }}
              {{- else if .Annotations.description }}
              {{ .Annotations.description }}
              {{- end }}
              {{- if .Labels.pod }}
              <b>Pod:</b> <code>{{ .Labels.pod }}</code>
              {{- end }}
              {{- if .Labels.node }}
              <b>Node:</b> <code>{{ .Labels.node }}</code>
              {{- end }}
              {{- if .Labels.job }}
              <b>Job:</b> <code>{{ .Labels.job }}</code>
              {{- end }}
              {{- if .GeneratorURL }}
              <a href="{{ .GeneratorURL }}">source</a>
              {{- end }}
              {{- end }}
              {{ end }}
          config:
            global:
              resolve_timeout: 5m
            inhibit_rules:
              - source_matchers:
                  - 'severity = critical'
                target_matchers:
                  - 'severity =~ warning|info'
                equal:
                  - 'namespace'
                  - 'alertname'
              - source_matchers:
                  - 'severity = warning'
                target_matchers:
                  - 'severity = info'
                equal:
                  - 'namespace'
                  - 'alertname'
              - source_matchers:
                  - 'alertname = InfoInhibitor'
                target_matchers:
                  - 'severity = info'
                equal:
                  - 'namespace'
              - target_matchers:
                  - 'alertname = InfoInhibitor'
            route:
              group_by: ['namespace']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'telegram-homelab'
              routes:
                - receiver: 'null'
                  matchers:
                    - alertname =~ "Watchdog|InfoInhibitor|KubeClientCertificateExpiration"
            receivers:
              - name: 'null'
              - name: 'telegram-homelab'
                telegram_configs:
                  - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram-auth/telegram_bot_token
                    chat_id: -1003509565932
                    message_thread_id: 20
                    parse_mode: 'HTML'
                    send_resolved: true
                    message: '{{ template "telegram.message" . }}'
            templates:
              - '/etc/alertmanager/config/*.tmpl'
          alertmanagerSpec:
            secrets:
              - alertmanager-telegram-auth
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: "ceph-block"
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
        grafana:
          enabled: false

          #plugins:
          #  - victoriametrics-logs-datasource
          #  - victoriametrics-metrics-datasource
          #ingress:
          #  enabled: true
          #  hosts:
          #    - grafana.kirillorlov.pro
          #  tls:
          #  - secretName: grafana-secret
          #    hosts:
          #      - grafana.kirillorlov.pro
          #  annotations:
          #    cert-manager.io/cluster-issuer: "acme-issuer"
          #    gethomepage.dev/enabled: "true"
          #    gethomepage.dev/href: "https://grafana.kirillorlov.pro"
          #    gethomepage.dev/group: Cluster Management
          #    gethomepage.dev/name: Grafana
          #    gethomepage.dev/icon: grafana.png
          #    gethomepage.dev/pod-selector: "app.kubernetes.io/name=grafana"
          #    gethomepage.dev/widget.type: grafana
          #    gethomepage.dev/widget.url: http://prometheus-grafana.prometheus.svc.cluster.local
          #    gethomepage.dev/widget.username: diverofdark
          #    gethomepage.dev/widget.password: "$admin-password$"
          #    kirillorlov.pro/annotationsFromSecretName: prometheus-grafana
        
          persistence:
            enabled: true
            type: sts
            storageClassName: "ceph-block"
            accessModes: ["ReadWriteOnce"]
            size: 5Gi
            finalizers:
              - kubernetes.io/pvc-protection
        prometheus:
          prometheusSpec:
            podMonitorNamespaceSelector: {}
            podMonitorSelector: {}
            podMonitorSelectorNilUsesHelmValues: false
            ruleNamespaceSelector: {}
            ruleSelector: {}
            ruleSelectorNilUsesHelmValues: false
            serviceMonitorNamespaceSelector: {}
            serviceMonitorSelector: {}
            serviceMonitorSelectorNilUsesHelmValues: false
            probeNamespaceSelector: {}
            probeSelector: {}
            probeSelectorNilUsesHelmValues: false
            scrapeConfigNamespaceSelector: {}
            scrapeConfigSelector: {}
            scrapeConfigSelectorNilUsesHelmValues: false
            retention: 3d
            remoteWrite:
              - url: http://vmsingle-main.victoriametrics.svc.cluster.local:8429/api/v1/write
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: "ceph-block"
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 25Gi
          ingress:
            enabled: true
            hosts:
              - prometheus.kirillorlov.pro
            tls: 
            - secretName: prometheus-secret
              hosts:
                - prometheus.kirillorlov.pro
            annotations:
              cert-manager.io/cluster-issuer: "acme-issuer"
              gethomepage.dev/enabled: "true"
              gethomepage.dev/href: "https://prometheus.kirillorlov.pro"
              gethomepage.dev/group: Cluster Management
              gethomepage.dev/name: Prometheus
              gethomepage.dev/icon: prometheus.png
              gethomepage.dev/pod-selector: "app.kubernetes.io/name=prometheus"
              gethomepage.dev/widget.type: prometheus
              gethomepage.dev/widget.url: http://prometheus-operated.prometheus.svc.cluster.local:9090 

    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 82.18.0
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      prune: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
