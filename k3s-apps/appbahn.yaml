apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: appbahn
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: appbahn
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: ghcr.io/diverofdark/appbahn/charts
    targetRevision: 2026.05.02-5
    chart: appbahn
    helm:
      valuesObject:
        platform:
          resources:
            limits:
              memory: 1Gi
          domain:
            base: "appbahn.kirillorlov.pro"
          namespacePrefix: "abp"
          database:
            url: "jdbc:postgresql://appbahn-db-rw.appbahn.svc.cluster.local:5432/appbahn"
            credentialRef: "appbahn-db-app"
          auth:
            issuerUrl: "https://auth.kirillorlov.pro"
            audience: "appbahn"
            existingSecret: "appbahn-platform-oidc"
          ingress:
            className: "traefik"
            annotations:
              cert-manager.io/cluster-issuer: acme-issuer
              gethomepage.dev/enabled: "true"
              gethomepage.dev/name: "AppBahn"
              gethomepage.dev/description: "Platform Management"
              gethomepage.dev/group: "Infra"
              gethomepage.dev/href: "https://appbahn.kirillorlov.pro"
              gethomepage.dev/pod-selector: "app.kubernetes.io/name=appbahn-platform"
            tls:
              secretName: "appbahn-platform-tls"
          branding:
            instanceName: "Homelab AppBahn"
            loginButtonText: "Log in with Homelab SSO"
        operator:
          resources:
            limits:
              memory: 1Gi
          clusterName: "homelab"
          ingressClassName: "traefik"
          clusterIssuer: "acme-issuer"
          auth:
            existingSecret: "appbahn-operator-oidc"
            tokenEndpoint: "https://auth.kirillorlov.pro/oauth/v2/token"
        serviceMonitor:
          enabled: true
        additionalObjects:
          # --- OIDC credentials from OpenBao ---
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: appbahn-platform-oidc
            spec:
              secretStoreRef:
                name: openbao-store
                kind: ClusterSecretStore
              refreshInterval: "1h"
              target:
                name: appbahn-platform-oidc
                creationPolicy: Owner
                deletionPolicy: Retain
              data:
                - secretKey: client-id
                  remoteRef:
                    key: zitadel/appbahn_platform-credentials
                    property: client_id
                - secretKey: client-secret
                  remoteRef:
                    key: zitadel/appbahn_platform-credentials
                    property: client_secret
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: appbahn-operator-oidc
            spec:
              secretStoreRef:
                name: openbao-store
                kind: ClusterSecretStore
              refreshInterval: "1h"
              target:
                name: appbahn-operator-oidc
                creationPolicy: Owner
                deletionPolicy: Retain
              data:
                - secretKey: client-id
                  remoteRef:
                    key: zitadel/appbahn_operator-credentials
                    property: client_id
                - secretKey: client-secret
                  remoteRef:
                    key: zitadel/appbahn_operator-credentials
                    property: client_secret
          # --- CNPG PostgreSQL cluster ---
          - apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
            metadata:
              name: appbahn-db
            spec:
              instances: 2
              imageName: ghcr.io/cloudnative-pg/postgresql:17
              storage:
                size: 5Gi
              monitoring:
                enablePodMonitor: true
              postgresql:
                parameters:
                  max_slot_wal_keep_size: "2GB"
              bootstrap:
                initdb:
                  database: appbahn
                  owner: appbahn
              plugins:
                - name: barman-cloud.cloudnative-pg.io
                  enabled: true
                  isWALArchiver: true
                  parameters:
                    barmanObjectName: yggdrasil-store
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
