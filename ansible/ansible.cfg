[defaults]
inventory = inventory/hosts.yaml
roles_path = roles
interpreter_python = auto_silent
retry_files_enabled = false
# hermes (KubeVirt VM behind pod-network masquerade) can take ~25s to
# re-establish its tailscale path after idle — the 10s default times out.
timeout = 60
# Mitogen: persistent interpreter per host instead of fork+reconnect per task
# (plugin path comes from ANSIBLE_STRATEGY_PLUGINS, exported by flake.nix from
# the nix store). If mitogen ever lags behind ansible-core and errors, run
# with ANSIBLE_STRATEGY=linear to override.
strategy = mitogen_linear

[ssh_connection]
pipelining = true
# Keepalives: hermes' tailscale path can flap mid-task; without these a
# half-dead TCP connection hangs the play forever instead of failing fast.
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=15 -o ServerAliveCountMax=4
