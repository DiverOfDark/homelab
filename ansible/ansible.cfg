[defaults]
inventory = inventory/hosts.yaml
roles_path = roles
interpreter_python = auto_silent
retry_files_enabled = false
# Mitogen: persistent interpreter per host instead of fork+reconnect per task
# (plugin path comes from ANSIBLE_STRATEGY_PLUGINS, exported by flake.nix from
# the nix store). If mitogen ever lags behind ansible-core and errors, run
# with ANSIBLE_STRATEGY=linear to override.
strategy = mitogen_linear

[ssh_connection]
pipelining = true
