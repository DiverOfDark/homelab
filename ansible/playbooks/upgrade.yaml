---
# Full system upgrade for Debian-based hosts.
# Run via: task ansible:upgrade
- name: Full system upgrade
  hosts: all
  become: true
  tasks:
    # Keep every host on the rolling "testing" suite before upgrading —
    # shared with the base role (roles/base/tasks/apt_sources.yaml).
    - name: Ensure apt sources track testing
      ansible.builtin.import_role:
        name: base
        tasks_from: apt_sources

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Perform full upgrade
      ansible.builtin.apt:
        upgrade: full
        autoremove: true
        autoclean: true
      register: apt_upgrade

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Report if reboot is required
      ansible.builtin.debug:
        msg: |
          ⚠️  Reboot is required on {{ inventory_hostname }}.
          The file /var/run/reboot-required exists.
          Please reboot the host manually when convenient:
            sudo reboot
      when: reboot_required_file.stat.exists
