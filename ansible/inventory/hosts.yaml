all:
  vars:
    # All hosts are Debian — pin the interpreter so mitogen never runs
    # discovery. Discovery spawns multiple SSH contexts per host (python3.14
    # probe → python3.13 → /usr/bin/python3.13) and races its own refcounting,
    # which intermittently killed connections mid-task (worst on hermes, whose
    # tailscale path is slowest).
    ansible_python_interpreter: /usr/bin/python3
  children:
    headscale:
      hosts:
        bifrost:
          # Resolves to the pinned hcloud primary IP (terraform/dns.tf). If DNS
          # is ever broken, fall back to `tofu output bifrost_ipv4`.
          ansible_host: headscale.kirillorlov.pro
          # Must match local.bifrost_ssh_port in terraform/hetzner.tf
          ansible_port: 22320
          ansible_user: root
    # Full management: base hardening + tailscale
    tailnet_members:
      vars:
        # Not publicly exposed (behind NAT, reached over the tailnet) — sshd
        # stays on 22. The non-default port is only for bifrost's public IP.
        ssh_port: 22
      hosts:
        yggdrasil:
          # MagicDNS — reachable because the ansible workstation is a tailnet member
          ansible_host: yggdrasil.ts.kirillorlov.pro
          ansible_user: root
        alfheimr:
          # pihole box. Root SSH is disabled — requires passwordless sudo for
          # the user (one-time): echo 'diverofdark ALL=(ALL) NOPASSWD:ALL' | sudo tee /etc/sudoers.d/diverofdark
          ansible_host: alfheimr.ts.kirillorlov.pro
          ansible_user: diverofdark
          ansible_become: true
          # LAN-side openings (tailnet is covered by the tailscale0 rule).
          # Verified against the live listener inventory (2026-07-05):
          # 53 DNS for the whole LAN, 80/443 pihole web UI, 9100 node_exporter
          # (cluster scrapes 192.168.178.2:9100 over LAN), 123 NTP, 5353 mDNS.
          # Pihole does NOT serve DHCP (confirmed) — no 67/udp.
          nftables_open_tcp_ports: [53, 80, 443, 9100]
          nftables_open_udp_ports: [53, 123, 5353]
        hermes:
          # KubeVirt VM (in kubevirt-vms ns, name=claw) running the hermes voice-assistant agent.
          # Reached via the hermes-api LoadBalancer (OpenSSH on guest :22320):
          # the VM's tailscale path (behind pod-network masquerade) flaps under
          # load and kept killing ansible runs. Interactive fallback over the
          # tailnet: hermes.ts.kirillorlov.pro (Tailscale SSH, port 22).
          ansible_host: 192.168.179.20
          ansible_user: diverofdark
          ansible_become: true
          # Ports that must be open on the VM's main interface (nftables):
          # - 8642: hermes API (used by voice-assistant bot via K8s Service)
          # - 9119: hermes WebUI (exposed via Ingress)
          # - 9100: node-exporter (scraped over Tailscale via ScrapeConfig)
          # Note: traffic over tailscale0 is allowed by default in the base role.
          nftables_open_tcp_ports: [8642, 9119, 9100]
          # Root disk is Ceph RBD — swapping to it would turn memory pressure
          # into cluster I/O. zram is the primary swap; /swapfile is only an
          # emergency overflow (see roles/base/tasks/swap.yaml).
          swap_use_zram: true
