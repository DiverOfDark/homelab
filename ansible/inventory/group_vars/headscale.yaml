# renovate: datasource=github-releases depName=juanfont/headscale
headscale_version: "0.26.1"

headscale_server_url: https://headscale.kirillorlov.pro
headscale_base_domain: ts.kirillorlov.pro

# Tailnet-wide DNS: pihole (on the tailnet node named below) serves ALL
# queries for every tailnet device — ad-blocking everywhere + internal
# kirillorlov.pro names, replacing the WARP gateway DNS behavior. No hardcoded
# IP: the headscale role resolves the node's tailnet IP at deploy time from
# `headscale nodes list`, so a re-registration self-heals on the next deploy.
# Until the node has joined (or if the lookup fails), the fallback resolvers
# below are used. Trade-off: a remote device loses DNS if home/pihole is
# unreachable — escape hatch is toggling "Use Tailscale DNS" off on the
# device. Servers are unaffected (ansible tailscale role and the Talos
# extension run with accept-dns off).
headscale_dns_node: alfheimr
headscale_override_local_dns: true
# Fallback when headscale_dns_node isn't registered (yet); replaced by the
# deploy-time lookup once it is.
headscale_global_dns:
  - 1.1.1.1
  - 9.9.9.9

# OIDC (Zitadel). Client id/secret are NOT stored in git — they are read from
# OpenBao at playbook run time (see playbooks/site.yaml pre_tasks). Zitadel app
# is managed by terraform/zitadel.tf, credentials live at
# secret/zitadel/headscale-credentials.
headscale_oidc_issuer: https://auth.kirillorlov.pro

# nftables (roles/base) openings for headscale: ACME + TLS/DERP, STUN
nftables_open_tcp_ports: [80, 443]
nftables_open_udp_ports: [3478]

# Infrastructure nodes register under this headscale user (created by the
# headscale role); humans log in via Zitadel OIDC.
headscale_infra_user: infra

# Tailscale SSH authorization. NOTE: once a node runs `tailscale set --ssh`,
# headscale INTERCEPTS tailnet SSH to it and denies anything not matching an
# ssh policy rule (no fall-through to sshd, learned the hard way) — so the
# policy must exist and authorize ansible's source. quasar & servers are
# owned by the infra user, hence infra@ in src from day one. After your first
# OIDC login exists, append its EXACT Username from `headscale users list`
# ('@' suffix if it has no domain part), e.g. "kirill@". Only registered
# users may be referenced — unknown users prevent headscale from starting.
headscale_ssh_src_users: ["infra@"]
# Devices tailscale SSH may target (user@ = all nodes owned by that user)
# and the unix logins allowed.
headscale_ssh_dst_users: ["infra@"]
headscale_ssh_logins: ["root", "diverofdark"]
