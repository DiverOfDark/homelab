---
# deb822 replaces the deprecated apt_repository AND the separate keyring
# download — signed_by fetches the (armored) key and inlines it.
- name: Add tailscale apt repository
  ansible.builtin.deb822_repository:
    name: tailscale
    types: deb
    uris: https://pkgs.tailscale.com/stable/debian
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: main
    signed_by: "https://pkgs.tailscale.com/stable/debian/{{ ansible_facts['distribution_release'] }}.asc"
    state: present

# Hosts set up before the deb822 switch (or via tailscale's install.sh, like
# yggdrasil) have a one-line .list + keyring — remove them or apt complains
# about the repo being configured twice.
- name: Remove legacy tailscale repo definitions
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/tailscale.list
    - /etc/apt/sources.list.d/tailscale.tailscale.list
    - /usr/share/keyrings/tailscale-archive-keyring.gpg

- name: Install tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Enable tailscaled
  ansible.builtin.service:
    name: tailscaled
    enabled: true
    state: started
  ignore_errors: "{{ ansible_check_mode }}" # fresh host in --check: unit not installed yet

- name: Check tailscale registration state
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false
  check_mode: false # read-only; without this a --check run can't evaluate the join condition

- name: Join tailnet (first registration only)
  ansible.builtin.command: >-
    tailscale up
    --login-server={{ tailscale_login_server }}
    --authkey={{ tailscale_authkey }}
    {{ tailscale_extra_args }}
  when:
    - (tailscale_status.stdout | from_json).BackendState | default('') != 'Running'
    - tailscale_authkey | length > 0
  no_log: true

# Enforce on EVERY run, not just at join: hosts registered manually (runbook)
# predate these flags.
# - accept-dns=false: headscale pushes pihole-over-tailnet as global DNS with
#   override — a server that accepts it deadlocks the moment the tailnet path
#   wobbles (it needs DNS to resolve the DERP/control hostname to restore the
#   tailnet; yggdrasil hit exactly this). Servers must never take their OS
#   resolver from the tailnet.
# - ssh: tailscale SSH as a second login path, independent of sshd
#   config/keys (authorized via the headscale ssh policy).
# --accept-risk=lose-ssh: required because ansible itself connects over the
# tailnet. Safe: tailscale SSH only intercepts connections matching an ssh
# policy rule — non-matching ones (ansible from quasar, an infra-owned node)
# fall through to regular sshd, and the play's post_tasks verify
# reconnectability anyway.
- name: Enforce tailscale server settings (no tailnet DNS, tailscale SSH)
  ansible.builtin.command: >-
    tailscale set --accept-dns=false
    --ssh={{ 'true' if tailscale_enable_ssh else 'false' }}
    --accept-risk=lose-ssh
  changed_when: false
