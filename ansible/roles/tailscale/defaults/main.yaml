tailscale_login_server: https://headscale.kirillorlov.pro
# Long-lived reusable preauth key from OpenBao (secret/headscale, key
# authkey) — exported as TAILSCALE_AUTHKEY by the Taskfile (see
# ansible/README.md for the one-time creation command). Only used when the
# host is not already registered; empty ⇒ join is skipped.
tailscale_authkey: "{{ lookup('env', 'TAILSCALE_AUTHKEY') }}"
# accept-dns=false: servers must not have their resolv.conf rewritten to the
# tailnet split-DNS (pihole over subnet routes) — a tailnet outage would take
# their DNS down with it (bifrost especially: headscale ACME renewals).
tailscale_extra_args: "--accept-dns=false"

# Tailscale SSH: a second, sshd-independent login path over the tailnet.
# Only honored once headscale has an ssh policy authorizing it — see
# headscale_ssh_src_users in inventory/group_vars/headscale.yaml.
tailscale_enable_ssh: true
