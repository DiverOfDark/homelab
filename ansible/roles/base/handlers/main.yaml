---
# ignore_errors on check mode only: on a fresh host the packages/units these
# handlers restart were never actually installed during --check.
- name: Restart sshd
  ansible.builtin.service:
    name: ssh
    state: restarted
  ignore_errors: "{{ ansible_check_mode }}"

- name: Reload nftables
  ansible.builtin.service:
    name: nftables
    state: restarted
  ignore_errors: "{{ ansible_check_mode }}"

- name: Restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted
  ignore_errors: "{{ ansible_check_mode }}"