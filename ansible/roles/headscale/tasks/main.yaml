---
- name: Map architecture to deb arch
  ansible.builtin.set_fact:
    headscale_deb_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"

- name: Install headscale .deb (pinned version)
  ansible.builtin.apt:
    deb: "https://github.com/juanfont/headscale/releases/download/v{{ headscale_version }}/headscale_{{ headscale_version }}_linux_{{ headscale_deb_arch }}.deb"
  notify: Restart headscale

# Resolve the tailnet IP of the DNS node (pihole) by NAME — no hardcoded
# tailnet IPs in git. On the very first deploy headscale isn't running yet
# (or the node hasn't joined): the lookup fails gracefully and the fallback
# resolvers from group_vars stay in place until the next deploy.
- name: Look up tailnet nodes for DNS resolution
  ansible.builtin.command: headscale nodes list --output json
  register: hs_nodes_for_dns
  changed_when: false
  failed_when: false
  check_mode: false # read-only; must run in --check too or the DNS lookup falls back and the plan shows a bogus revert

- name: Point tailnet DNS at the {{ headscale_dns_node }} tailnet IP
  ansible.builtin.set_fact:
    headscale_global_dns: "{{ [dns_node_v4] }}"
  vars:
    dns_node: >-
      {{ hs_nodes_for_dns.stdout | from_json
         | selectattr('given_name', 'equalto', headscale_dns_node) | list }}
    dns_node_v4: >-
      {{ (dns_node | first).ip_addresses
         | select('match', '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$') | first }}
  when:
    - hs_nodes_for_dns.rc == 0
    - (hs_nodes_for_dns.stdout | default('')) | length > 0
    - (hs_nodes_for_dns.stdout | from_json
       | selectattr('given_name', 'equalto', headscale_dns_node) | list) | length > 0

- name: Write headscale config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/headscale/config.yaml
    owner: headscale
    group: headscale
    mode: "0600"
  notify: Restart headscale

- name: Ensure systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/headscale.service.d
    state: directory
    mode: "0755"

# The .deb unit runs headscale as its own user; binding :443 (TLS) and :80
# (ACME HTTP-01) needs the capability.
- name: Allow headscale to bind privileged ports
  ansible.builtin.copy:
    dest: /etc/systemd/system/headscale.service.d/override.conf
    content: |
      [Service]
      AmbientCapabilities=CAP_NET_BIND_SERVICE
      CapabilityBoundingSet=CAP_NET_BIND_SERVICE
    mode: "0644"
  notify: Restart headscale

- name: Enable and start headscale
  ansible.builtin.systemd:
    name: headscale
    enabled: true
    state: started
    daemon_reload: true

# Owns all infrastructure nodes (Talos, yggdrasil, bifrost itself); humans
# come in via OIDC instead.
- name: List headscale users
  ansible.builtin.command: headscale users list --output json
  register: headscale_users
  changed_when: false
  check_mode: false # read-only
  retries: 3
  delay: 2
  until: headscale_users.rc == 0

- name: Ensure infra headscale user exists
  ansible.builtin.command: headscale users create {{ headscale_infra_user }}
  when: headscale_infra_user not in (headscale_users.stdout | from_json | map(attribute='name') | list)
  changed_when: true
