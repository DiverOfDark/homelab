version: "3"

includes:
  talos:
    taskfile: ./talos/Taskfile.yaml
    dir: ./talos
  ansible:
    taskfile: ./ansible/Taskfile.yaml
    dir: ./ansible
  packer:
    taskfile: ./packer/Taskfile.yaml
    dir: ./packer
  tofu:
    taskfile: ./terraform/Taskfile.yaml
    dir: ./terraform

tasks:
  kubescape:
    desc: Run Kubescape NSA framework scan
    cmds:
      - kubescape scan framework nsa
    preconditions:
      - sh: command -v kubescape
        msg: "kubescape not found - enter the nix dev shell first"
